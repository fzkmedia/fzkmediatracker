// ── HELPERS ───────────────────────────────────────────────────────────
const toStr   = d => new Date(d).toISOString().split("T")[0];
const addDays = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const fmtD    = d => new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short"});
const fmtDFull= d => new Date(d).toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short"});
const daysBetween = (a,b) => Math.floor((new Date(b)-new Date(a))/86400000);
const elapsed = s => daysBetween(s, new Date());
const todayStr= () => toStr(new Date());

function getStatus(start,dur,done){
  if(done) return "done";
  const t=new Date(); t.setHours(0,0,0,0);
  const s=new Date(start); s.setHours(0,0,0,0);
  const e=addDays(s,dur); e.setHours(0,0,0,0);
  if(t<s) return "upcoming";
  if(t>=s&&t<e) return "active";
  return "overdue";
}

function buildStages(client){
  const tpl = client.type==="onboarding" ? OB_STAGES : CY_STAGES;
  const base = new Date(client.startDate);
  return tpl.map(s=>{
    const aStart = addDays(base, s.d);
    const aEnd   = addDays(aStart, s.dur);
    const start  = client.ov?.[s.key+"_s"] ? new Date(client.ov[s.key+"_s"]) : aStart;
    const end    = client.ov?.[s.key+"_e"] ? new Date(client.ov[s.key+"_e"]) : aEnd;
    const done   = !!(client.checks?.[s.key]);
    const days   = Math.max(1, daysBetween(start, end));
    return {...s, start, end, aStart, aEnd, done, dur:days, status:getStatus(start,days,done),
      sOv:!!client.ov?.[s.key+"_s"], eOv:!!client.ov?.[s.key+"_e"]};
  });
}

// ── SUPABASE ──────────────────────────────────────────────────────────
const H = {apikey:SB_KEY, Authorization:`Bearer ${SB_KEY}`};
async function dbGet(){
  // Select both data AND the table-level updated_at for reliable sync comparison
  const r = await fetch(`${SB_URL}/rest/v1/cycle_tracker?id=eq.clients&select=data,updated_at`,{headers:H});
  const j = await r.json();
  if(!j?.[0]) return null;
  const payload = j[0].data ?? {};
  // Attach the table-level updated_at so poll can compare it reliably
  payload._ts = j[0].updated_at;
  return payload;
}
async function dbSet(payload){
  const ts = new Date().toISOString();
  const r = await fetch(`${SB_URL}/rest/v1/cycle_tracker?id=eq.clients`,{
    method:"PATCH",
    headers:{...H,"Content-Type":"application/json",Prefer:"return=minimal"},
    body:JSON.stringify({
      data: payload,
      updated_at: ts  // update the actual table column so all devices can compare
    }),
  });
  if(!r.ok) throw new Error(`DB error ${r.status}`);
  return ts;
}

// ── DATE FIELD WITH OVERRIDE ──────────────────────────────────────────
function DateFld({autoDate,ovKey,ovMap,onOv}){
  const [ed,setEd] = useState(false);
  const isOv = !!(ovMap?.[ovKey]);
  const val  = isOv ? ovMap[ovKey] : toStr(autoDate);
  if(ed) return (
    <input type="date" defaultValue={val} autoFocus
      onBlur={e=>{if(e.target.value)onOv(ovKey,e.target.value);setEd(false);}}
      style={{...iS,fontSize:11,padding:"2px 6px",width:120}}/>
  );
  return (
    <span onClick={()=>setEd(true)} style={{fontSize:11,fontFamily:"monospace",cursor:"pointer",
      color:isOv?R:G5,borderBottom:`1px dashed ${isOv?R:"transparent"}`,
      display:"inline-flex",alignItems:"center",gap:3}}>
      {fmtD(val)}
      {isOv
        ? <span onClick={e=>{e.stopPropagation();onOv(ovKey,null);}} title="Reset" style={{color:G3,fontSize:9}}>↺</span>
        : <span style={{color:G3,fontSize:9}}>✎</span>}
    </span>
  );
}

// ── POSTING PLAN ──────────────────────────────────────────────────────
function PostPlan({client,onUpdate}){
  if(!client.pieces||client.pieces<1)
    return <div style={{fontSize:11,color:G3,fontStyle:"italic",marginTop:6}}>Add piece count to see posting plan</div>;
  const today=new Date();today.setHours(0,0,0,0);
  const slots = Array.from({length:client.pieces},(_,i)=>{
    const auto = addDays(new Date(client.startDate), Math.round((i/client.pieces)*(client.dur||30)));
    const ov   = client.pd?.[`p${i+1}`];
    return {i,auto,date:ov?new Date(ov):auto,isOv:!!ov};
  });
  function setPD(k,v){
    const pd={...(client.pd||{})};
    if(!v)delete pd[k];else pd[k]=v;
    onUpdate({...client,pd});
  }
  return (
    <div className="postplan" style={{paddingLeft:30,marginTop:8}}>
      <div style={{fontSize:10,color:G5,fontWeight:700,marginBottom:6,letterSpacing:0.5}}>POSTING SCHEDULE — tap any date to edit</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {slots.map(s=>{
          const past=s.date<today;
          return (
            <div key={s.i} style={{background:past?BB:G1,border:`1.5px solid ${s.isOv?R:past?"#93C5FD":G3}`,borderRadius:8,padding:"4px 10px",display:"flex",alignItems:"center",gap:5}}>
              <span style={{fontSize:10,fontWeight:700,color:past?BL:G7}}>P{s.i+1}</span>
              <DateFld autoDate={s.auto} ovKey={`p${s.i+1}`} ovMap={client.pd||{}} onOv={(k,v)=>setPD(k,v)}/>
            </div>
          );
        })}
      </div>
    </div>
  );
}

                      <span style={{fontSize:10,color:G3}}>→</span>

                    <span style={{fontSize:10,padding:"2px 8px",borderRadius:20,whiteSpace:"nowrap",fontWeight:500,

          )}
        </div>
      )}
    </div>
  );
}

// ── AI CHAT ───────────────────────────────────────────────────────────
function AIChat({clients,groups,onClose}){
  const [msgs,setMsgs] = useState([{role:"assistant",content:"Hi! I know all your FZK Media clients. Ask me anything — \"Who's overdue?\", \"What should we focus on this week?\", \"Anshita's status?\""}]);
  const [inp,setInp]   = useState("");
  const [load,setLoad] = useState(false);
  const botRef = useRef(null);
  useEffect(()=>{botRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);

  async function send(){
    if(!inp.trim()||load) return;
    const um = {role:"user",content:inp.trim()};
    setMsgs(m=>[...m,um]);
    setInp("");
    setLoad(true);

    const today = new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
    const data  = clients.map(c=>{
      const stgs = buildStages(c);
      return {name:c.name,type:c.type,phase:c.phase,group:c.group,
        startDate:c.startDate,dur:c.dur||30,pieces:c.pieces,
        daysElapsed:elapsed(c.startDate),isDelayed:elapsed(c.startDate)>(c.dur||30),
        notes:c.notes||"",
        stages:stgs.map(s=>({name:s.label,status:s.status,start:toStr(s.start),done:s.done}))};
    });

    const sys = `You are the internal AI for FZK Media, a personal branding agency. Today: ${today}.
FZK manages Instagram/LinkedIn for founders — mainly storytelling reels. 
Onboarding (30d) → Cycle 1 (day 31) → C2 → C3 (~4 months total).
Groups: ${groups.join(", ")}
Client data: ${JSON.stringify(data)}
Answer specifically and concisely. Use bullets. Format dates as DD Mon.`;

    try{
      // Messages must start with user role — strip leading assistant messages
      let apiMsgs = [...msgs.slice(1), um].filter(m=>m.role==="user"||m.role==="assistant");
      while(apiMsgs.length>0&&apiMsgs[0].role==="assistant") apiMsgs.shift();
      if(apiMsgs.length===0) apiMsgs=[um];

      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":getKey(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,system:sys,messages:apiMsgs}),
      });
      const d = await res.json();
      if(d.error) throw new Error(d.error.message);
      setMsgs(m=>[...m,{role:"assistant",content:d.content?.[0]?.text||"No response."}]);
    } catch(e){
      setMsgs(m=>[...m,{role:"assistant",content:`Error: ${e.message}.\n\nMake sure your API key is saved (tap 🔑 in the nav).`}]);
    } finally{setLoad(false);}
  }

  return (
    <div className="ai-panel" style={{position:"fixed",right:0,top:0,bottom:0,width:380,background:W,
      boxShadow:"-4px 0 24px rgba(0,0,0,0.12)",zIndex:1000,display:"flex",flexDirection:"column"}}>
      <div style={{padding:"16px 20px",background:R,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:15,fontWeight:800,color:W}}>✦ FZK AI</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.65)"}}>Knows all your clients</div>
        </div>
        <button onClick={onClose} style={{background:"rgba(255,255,255,0.2)",border:"none",cursor:"pointer",
          fontSize:16,color:W,borderRadius:8,padding:"4px 10px"}}>✕</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"16px 20px",display:"flex",flexDirection:"column",gap:12}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            <div style={{maxWidth:"85%",padding:"10px 14px",fontSize:13,lineHeight:1.6,whiteSpace:"pre-wrap",
              borderRadius:m.role==="user"?"14px 14px 4px 14px":"14px 14px 14px 4px",
              background:m.role==="user"?R:G0,
              border:m.role==="user"?"none":`1.5px solid ${G1}`,
              color:m.role==="user"?W:BK}}>
              {m.content}
            </div>
          </div>
        ))}
        {load&&(
          <div style={{display:"flex",gap:4,padding:"10px 14px",background:G0,border:`1.5px solid ${G1}`,
            borderRadius:"14px 14px 14px 4px",width:"fit-content"}}>
            {[0,1,2].map(i=>(
              <div key={i} style={{width:6,height:6,borderRadius:"50%",background:G3,
                animation:`bounce 1s ${i*0.15}s infinite`}}/>
            ))}
          </div>
        )}
        <div ref={botRef}/>
      </div>
      <div style={{padding:"0 16px 10px",display:"flex",gap:5,flexWrap:"wrap"}}>
        {["Who's overdue?","Who's delayed?","This week","Anshita's status"].map(q=>(
          <button key={q} onClick={()=>setInp(q)}
            style={{fontSize:10,padding:"3px 9px",borderRadius:20,border:`1.5px solid ${G3}`,
              background:G0,color:G7,cursor:"pointer"}}>{q}</button>
        ))}
      </div>
      <div style={{padding:"10px 16px",borderTop:`1.5px solid ${G1}`,display:"flex",gap:8}}>
        <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()}
          placeholder="Ask anything…" style={{...iS,flex:1}}/>
        <button onClick={send} disabled={load||!inp.trim()}
          style={{padding:"8px 16px",background:R,border:"none",borderRadius:9,color:W,
            fontSize:13,fontWeight:700,cursor:"pointer",opacity:load||!inp.trim()?0.5:1}}>
          Send
        </button>
      </div>
    </div>
  );
}

// ── CALENDAR VIEW ─────────────────────────────────────────────────────
function CalView({clients}){
  const [wk,setWk] = useState(0);
  const today = useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d;},[]);

  const wkStart = useMemo(()=>{
    const d=new Date();d.setHours(0,0,0,0);
    const day=d.getDay();
    d.setDate(d.getDate()-(day===0?6:day-1)+wk*7);
    return d;
  },[wk]);

  const days = Array.from({length:7},(_,i)=>addDays(wkStart,i));

  const byDay = useMemo(()=>{
    const m={};
    days.forEach(d=>{m[d.toDateString()]=[];});
    clients.forEach(c=>{
      buildStages(c).forEach(s=>{
        days.forEach(d=>{
          const dd=new Date(d);dd.setHours(0,0,0,0);
          const ss=new Date(s.start);ss.setHours(0,0,0,0);
          const ee=new Date(s.end);ee.setHours(0,0,0,0);
          if(dd>=ss&&dd<ee) m[d.toDateString()].push({client:c.name,stage:s.label,status:s.status,color:s.color,done:s.done});
        });
      });
      if(c.pieces>0){
        const d=c.dur||30;
        Array.from({length:c.pieces},(_,i)=>{
          const ov=c.pd?.[`p${i+1}`];
          const dt=ov?new Date(ov):addDays(new Date(c.startDate),Math.round((i/c.pieces)*d));
          const ds=dt.toDateString();
          if(m[ds]!==undefined) m[ds].push({client:c.name,stage:`Post P${i+1}`,status:"posting",color:BL,done:false});
        });
      }
    });
    return m;
  },[clients,wkStart]);

  const btnS = {padding:"7px 14px",background:W,border:`1.5px solid ${G3}`,borderRadius:8,
    fontSize:12,color:G7,cursor:"pointer"};

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <button onClick={()=>setWk(w=>w-1)} style={btnS}>← Prev</button>
        <span style={{fontSize:14,fontWeight:700,color:BK,textAlign:"center"}}>
          {fmtDateFull(wkStart)} — {fmtDateFull(days[6])}
          {wk===0&&<span style={{fontSize:11,marginLeft:8,color:R,fontWeight:600}}> This week</span>}
        </span>
        <button onClick={()=>setWk(w=>w+1)} style={btnS}>Next →</button>
      </div>
      {wk!==0&&<button onClick={()=>setWk(0)} style={{...btnS,marginBottom:12,fontSize:11}}>↩ Today</button>}

      <div className="cal-grid" style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:8}}>
        {days.map(d=>{
          const isT=d.toDateString()===today.toDateString();
          const tasks=byDay[d.toDateString()]||[];
          return (
            <div key={d.toDateString()} style={{background:isT?RL:W,
              border:`1.5px solid ${isT?RM:G1}`,borderRadius:12,padding:"10px 8px",minHeight:110}}>
              <div style={{marginBottom:7}}>
                <div style={{fontSize:10,color:isT?R:G5,fontWeight:700,textTransform:"uppercase"}}>{d.toLocaleDateString("en-GB",{weekday:"short"})}</div>
                <div style={{fontSize:18,fontWeight:800,color:isT?R:BK}}>{d.getDate()}</div>
              </div>
              {tasks.length===0&&<div style={{fontSize:9,color:G3}}>—</div>}
              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                {tasks.slice(0,5).map((t,i)=>(
                  <div key={i} style={{fontSize:9,padding:"3px 5px",borderRadius:5,lineHeight:1.3,
                    background:t.done?GB:t.status==="overdue"?RL:`${t.color}15`,
                    border:`1px solid ${t.done?"#BBF7D0":t.status==="overdue"?RM:`${t.color}44`}`,
                    color:t.done?GR:t.status==="overdue"?RD:G7}}>
                    <div style={{fontWeight:700,color:t.color,fontSize:8}}>{t.client.split(" ")[0]}</div>
                    {t.stage}
                  </div>
                ))}
                {tasks.length>5&&<div style={{fontSize:9,color:G5}}>+{tasks.length-5} more</div>}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{marginTop:20,padding:"16px 20px",background:W,borderRadius:12,border:`1.5px solid ${G1}`}}>
        <div style={{fontSize:13,fontWeight:700,color:BK,marginBottom:10}}>📋 Today — {fmtDateFull(today)}</div>
        {(byDay[today.toDateString()]||[]).length===0
          ? <div style={{fontSize:12,color:G3}}>Nothing active today</div>
          : <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {(byDay[today.toDateString()]||[]).map((t,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",
                  background:G0,borderRadius:8,border:`1.5px solid ${G1}`}}>
                  <span style={{width:8,height:8,borderRadius:"50%",background:t.color,flexShrink:0,display:"inline-block"}}/>
                  <span style={{fontSize:13,fontWeight:600,color:BK,flex:1}}>{t.client}</span>
                  <span style={{fontSize:12,color:G5}}>{t.stage}</span>
                  <span style={{fontSize:10,padding:"2px 8px",borderRadius:20,fontWeight:500,
                    background:t.status==="overdue"?RL:t.done?GB:G1,
                    color:t.status==="overdue"?RD:t.done?GR:G5}}>
                    {t.done?"Done":t.status}
                  </span>
                </div>
              ))}
            </div>
        }
      </div>
    </div>
  );
}

// ── DELAY REPORT ──────────────────────────────────────────────────────
function Report({clients,onClose}){
  const today = new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  const delayed = clients.filter(c=>elapsed(c.startDate)>(c.dur||30));
  const overStages = clients.flatMap(c=>
    buildStages(c).filter(s=>s.status==="overdue")
      .map(s=>({client:c.name,stage:s.label,daysOver:Math.floor((new Date()-s.end)/86400000)}))
  ).sort((a,b)=>b.daysOver-a.daysOver);
  const onTrack = Math.max(0,clients.length-delayed.length-clients.filter(c=>buildStages(c).some(s=>s.status==="overdue")).length);

  function buildTxt(){
    let b=`FZK Media — Cycle Tracker Report\n${today}\n\n`;
    if(delayed.length){b+=`⚠ DELAYED (${delayed.length})\n${"-".repeat(40)}\n`;delayed.forEach(c=>{const e=elapsed(c.startDate);b+=`• ${c.name} — ${e} days (+${e-(c.dur||30)}d)\n`;});b+="\n";}
    if(overStages.length){b+=`🔴 OVERDUE STAGES (${overStages.length})\n${"-".repeat(40)}\n`;overStages.forEach(s=>{b+=`• ${s.client} — ${s.stage} (${s.daysOver}d overdue)\n`;});b+="\n";}
    if(!delayed.length&&!overStages.length)b+="✅ All clients on track!\n";
    b+=`\n— FZK Media Cycle Tracker`;
    return b;
  }

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:1100,
      display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:W,borderRadius:20,padding:28,width:"100%",maxWidth:520,
        maxHeight:"85vh",overflowY:"auto",boxShadow:"0 16px 48px rgba(0,0,0,0.2)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div>
            <div style={{fontSize:16,fontWeight:800,color:BK}}>📧 Delay Report</div>
            <div style={{fontSize:11,color:G5,marginTop:2}}>{today}</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:G5}}>✕</button>
        </div>
        <div style={{display:"flex",gap:10,marginBottom:20}}>
          {[{l:"Delayed",v:delayed.length,c:delayed.length?RD:G5,bg:delayed.length?RL:G0},
            {l:"Overdue Stages",v:overStages.length,c:overStages.length?OR:G5,bg:overStages.length?OB:G0},
            {l:"On Track",v:onTrack,c:GR,bg:GB}].map(s=>(
            <div key={s.l} style={{flex:1,background:s.bg,borderRadius:10,padding:"10px 14px",textAlign:"center"}}>
              <div style={{fontSize:22,fontWeight:800,color:s.c}}>{s.v}</div>
              <div style={{fontSize:10,color:G5,marginTop:2}}>{s.l}</div>
            </div>
          ))}
        </div>
        {delayed.length>0&&(
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:RD,marginBottom:8}}>⚠ Delayed</div>
            {delayed.map(c=>{const e=elapsed(c.startDate);return(
              <div key={c.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                padding:"9px 13px",background:RL,border:`1.5px solid ${RM}`,borderRadius:9,marginBottom:5}}>
                <span style={{fontSize:13,fontWeight:600,color:BK}}>{c.name}</span>
                <span style={{fontSize:11,color:RD,fontWeight:500}}>{e}d · +{e-(c.dur||30)}d over</span>
              </div>
            );})}
          </div>
        )}
        {overStages.length>0&&(
          <div style={{marginBottom:18}}>
            <div style={{fontSize:12,fontWeight:700,color:OR,marginBottom:8}}>🔴 Overdue Stages</div>
            {overStages.map((s,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                padding:"9px 13px",background:OB,border:"1.5px solid #FDE68A",borderRadius:9,marginBottom:5}}>
                <div>
                  <span style={{fontSize:13,fontWeight:600,color:BK}}>{s.client}</span>
                  <span style={{fontSize:12,color:G5,marginLeft:8}}>→ {s.stage}</span>
                </div>
                <span style={{fontSize:11,color:OR,fontWeight:500}}>{s.daysOver}d overdue</span>
              </div>
            ))}
          </div>
        )}
        {!delayed.length&&!overStages.length&&(
          <div style={{textAlign:"center",padding:"20px",background:GB,border:"1.5px solid #BBF7D0",borderRadius:12,marginBottom:18}}>
            <div style={{fontSize:28,marginBottom:6}}>✅</div>
            <div style={{fontSize:14,fontWeight:700,color:GR}}>All clients on track!</div>
          </div>
        )}
        <pre style={{background:G0,border:`1.5px solid ${G1}`,borderRadius:10,padding:"14px 16px",
          fontSize:11,color:G7,lineHeight:1.7,whiteSpace:"pre-wrap",fontFamily:"monospace",
          maxHeight:150,overflowY:"auto",marginBottom:16}}>{buildTxt()}</pre>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>navigator.clipboard.writeText(buildTxt()).then(()=>alert("Copied!"))}
            style={{flex:1,padding:"11px",background:G0,border:`1.5px solid ${G3}`,borderRadius:10,
              cursor:"pointer",fontSize:13,color:G7,fontWeight:600}}>📋 Copy</button>
          <button onClick={()=>window.open(`mailto:${EMAILS}?subject=${encodeURIComponent("FZK Media — Report · "+today)}&body=${encodeURIComponent(buildTxt())}`)}
            style={{flex:2,padding:"11px",background:R,border:"none",borderRadius:10,cursor:"pointer",
              fontSize:13,color:W,fontWeight:700,boxShadow:`0 2px 8px ${R}44`}}>📧 Send to Team</button>
        </div>
        <div style={{marginTop:10,fontSize:11,color:G3,textAlign:"center"}}>Sends to all 7 FZK Media team members</div>
      </div>
    </div>
  );
}

// ── GROUP MANAGER ─────────────────────────────────────────────────────
function GrpMgr({groups,onUpdate,onClose}){
  const [ng,setNg]=useState("");
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.3)",zIndex:900,
      display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:W,borderRadius:16,padding:28,width:360,boxShadow:"0 8px 32px rgba(0,0,0,0.15)"}}>
        <div style={{fontSize:16,fontWeight:800,color:BK,marginBottom:4}}>Manage Groups</div>
        <div style={{fontSize:12,color:G5,marginBottom:20}}>Drag clients between groups</div>
        <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:16}}>
          {groups.map(g=>(
            <div key={g} style={{display:"flex",alignItems:"center",justifyContent:"space-between",
              padding:"9px 13px",background:G0,borderRadius:9,border:`1.5px solid ${G1}`}}>
              <span style={{fontSize:13,fontWeight:500,color:BK}}>{({"Onboarding":"🌱","Active":"⚡","Getting Started":"🚀","OG Client":"⭐","To Start":"📋"})[g]||"●"} {g}</span>
              <button onClick={()=>{if(groups.length>1)onUpdate(groups.filter(x=>x!==g));}}
                style={{background:"none",border:"none",cursor:"pointer",color:RM,fontSize:16}}>✕</button>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          <input value={ng} onChange={e=>setNg(e.target.value)} placeholder="New group name…"
            onKeyDown={e=>{if(e.key==="Enter"&&ng.trim()){onUpdate([...groups,ng.trim()]);setNg("");}}}
            style={{...iS,flex:1}}/>
          <button onClick={()=>{if(ng.trim()){onUpdate([...groups,ng.trim()]);setNg("");}}}
            style={{padding:"7px 14px",background:R,border:"none",borderRadius:8,color:W,
              fontSize:13,fontWeight:700,cursor:"pointer"}}>Add</button>
        </div>
        <button onClick={onClose} style={{width:"100%",marginTop:16,padding:"10px",background:G0,
          border:`1.5px solid ${G3}`,borderRadius:9,cursor:"pointer",fontSize:13,color:G7,fontWeight:500}}>Done</button>
      </div>
    </div>
  );
}

// ── PASSWORD SCREEN ───────────────────────────────────────────────────
function PwScreen({onUnlock}){
  const [step,setStep] = useState("pw");
  const [pw,setPw]     = useState("");
  const [ak,setAk]     = useState("");
  const [err,setErr]   = useState("");

  function tryPw(){
    if(pw.trim()===PW){
      if(!localStorage.getItem("fzk_ak")) setStep("key");
      else onUnlock();
    } else {
      setErr("Wrong password — try again");
      setTimeout(()=>setErr(""),2000);
      setPw("");
    }
  }
  function saveKey(){
    const k=ak.trim();
    if(k.startsWith("sk-ant-")){localStorage.setItem("fzk_ak",k);onUnlock();}
    else{setErr("Must start with sk-ant-");setTimeout(()=>setErr(""),2000);}
  }

  const wrap={minHeight:"100vh",background:R,display:"flex",alignItems:"center",justifyContent:"center",padding:16};
  const box={background:W,borderRadius:24,padding:"40px 32px",width:"100%",maxWidth:380,textAlign:"center",boxShadow:"0 24px 64px rgba(0,0,0,0.28)"};

  if(step==="key") return (
    <div style={wrap}>
      <div style={box}>
        <div style={{fontSize:10,background:R,color:W,borderRadius:99,padding:"3px 14px",
          display:"inline-block",fontWeight:700,marginBottom:16,letterSpacing:1}}>ONE-TIME SETUP</div>
        <div style={{fontSize:28,fontWeight:900,color:R,letterSpacing:-1,marginBottom:4}}>FZK Media</div>
        <div style={{fontSize:13,color:G5,marginBottom:20}}>Enter your Anthropic API key for AI Chat</div>
        <div style={{fontSize:12,color:G7,background:G0,padding:"12px 14px",borderRadius:12,
          textAlign:"left",marginBottom:20,lineHeight:1.7}}>
          Stored <strong>only on this device</strong> — never in code or GitHub.<br/>
          Get it at: <strong style={{color:R}}>console.anthropic.com</strong>
        </div>
        <input value={ak} onChange={e=>setAk(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveKey()}
          placeholder="sk-ant-api03-..." autoFocus
          style={{...iS,width:"100%",padding:"11px 14px",fontSize:13,
            border:`2px solid ${err?R:G3}`,marginBottom:8}}/>
        {err&&<div style={{fontSize:12,color:R,marginBottom:8,fontWeight:600}}>{err}</div>}
        <button onClick={saveKey} style={{width:"100%",padding:"13px",background:R,border:"none",
          borderRadius:12,color:W,fontSize:14,fontWeight:800,marginBottom:10,cursor:"pointer",
          boxShadow:`0 4px 20px ${R}55`}}>
          Save & Open Tracker →
        </button>
        <button onClick={onUnlock} style={{width:"100%",padding:"10px",background:"none",
          border:`1.5px solid ${G3}`,borderRadius:10,color:G5,fontSize:12,cursor:"pointer"}}>
          Skip — use without AI
        </button>
      </div>
    </div>
  );

  return (
    <div style={wrap}>
      <div style={box}>
        <div style={{fontSize:32,fontWeight:900,color:R,letterSpacing:-1,marginBottom:2}}>FZK Media</div>
        <div style={{fontSize:16,fontWeight:700,color:G7,marginBottom:6}}>Media · Cycle Tracker</div>
        <div style={{fontSize:11,color:G3,marginBottom:28}}>Internal Team Tool</div>
        <input type="password" value={pw} onChange={e=>setPw(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&tryPw()} placeholder="Team password" autoFocus
          style={{...iS,width:"100%",padding:"13px 16px",fontSize:15,textAlign:"center",
            border:`2px solid ${err?R:G3}`,marginBottom:10,letterSpacing:2}}/>
        {err&&<div style={{fontSize:12,color:R,marginBottom:10,fontWeight:600}}>{err}</div>}
        <button onClick={tryPw} style={{width:"100%",padding:"13px",background:R,border:"none",
          borderRadius:12,color:W,fontSize:15,fontWeight:800,cursor:"pointer",
          boxShadow:`0 4px 20px ${R}55`}}>
          Enter →
        </button>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────
function App(){
  const [clients,  setClients]  = useState(null);
  const [groups,   setGroups]   = useState(DEF_GROUPS);
  const [nextId,   setNextId]   = useState(100);
  const [sync,     setSync]     = useState("loading"); // loading|saving|synced|error
  const [lastSave, setLastSave] = useState(null);
  const [view,     setView]     = useState("tracker");
  const [filter,   setFilter]   = useState("all");
  const [search,   setSearch]   = useState("");
  const [showAI,   setShowAI]   = useState(false);
  const [showGrp,  setShowGrp]  = useState(false);
  const [showRpt,  setShowRpt]  = useState(false);
  const [dragId,   setDragId]   = useState(null);
  const [dragOver, setDragOver] = useState(null);

  const saveRef    = useRef(null);
  const lastTsRef  = useRef(null); // last timestamp we saved or received

  // Load from Supabase
  useEffect(()=>{
    async function load(){
      try{
        const d = await dbGet();
        if(d?.clients&&Array.isArray(d.clients)&&d.clients.length>0){
          setClients(d.clients);
          if(d.groups) setGroups(d.groups);
          setNextId(Math.max(...d.clients.map(c=>c.id),99)+1);
          lastTsRef.current = d._ts || d.updated_at || null;
        } else {
          setClients(DEF_CLIENTS);
          const ts = new Date().toISOString();
          const initTs = await dbSet({clients:DEF_CLIENTS,groups:DEF_GROUPS});
          lastTsRef.current = initTs;
        }
        setSync("synced");
      } catch(e){
        console.error("Load error:",e);
        setClients(DEF_CLIENTS);
        setSync("error");
      }
    }
    load();
  },[]);

  // Auto-save on change (debounced 1s)
  useEffect(()=>{
    if(!clients||sync==="loading") return;
    if(saveRef.current) clearTimeout(saveRef.current);
    setSync("saving");
    saveRef.current = setTimeout(async()=>{
      try{
        const ts = new Date().toISOString();
        const savedTs = await dbSet({clients,groups});
        lastTsRef.current = savedTs;
        setLastSave(new Date());
        setSync("synced");
      } catch(e){
        console.error("Save error:",e);
        setSync("error");
      } finally{
        saveRef.current = null;
      }
    },1000);
  },[clients,groups]);

  // Poll every 8s for changes from other devices
  useEffect(()=>{
    if(!clients) return;
    const poll = setInterval(async()=>{
      if(saveRef.current) return; // skip while saving
      try{
        const d = await dbGet();
        if(!d?.clients) return;
        const remoteTs = d._ts ? new Date(d._ts).getTime() : 0;
        const localTs  = lastTsRef.current ? new Date(lastTsRef.current).getTime() : 0;
        if(remoteTs > localTs + 1000){
          // Remote is newer — update local state
          lastTsRef.current = d._ts;
          console.log("🔄 Pulling remote update from", d._ts);
          setClients(prev=>{
            if(JSON.stringify(prev)===JSON.stringify(d.clients)) return prev;
            return d.clients;
          });
          if(d.groups) setGroups(g=>{
            if(JSON.stringify(g)===JSON.stringify(d.groups)) return g;
            return d.groups;
          });
        }
      } catch(e){ console.warn("Poll error:",e); }
    },8000);
    return ()=>clearInterval(poll);
  },[]); // intentionally empty — poll runs independently

  const upd = useCallback((id,data)=>setClients(p=>p.map(c=>c.id===id?{...c,...data}:c)),[]);
  const del = useCallback((id)=>setClients(p=>p.filter(c=>c.id!==id)),[]);

  function addClient(){
    const nc={id:nextId,name:"New Client",type:"cycle",phase:"C1",startDate:todayStr(),
      dur:30,pieces:0,group:groups[1]||groups[0],checks:{},ov:{},pd:{},notes:""};
    setClients(p=>[...p,nc]);
    setNextId(n=>n+1);
  }

  function updateKey(){
    const k=prompt("Paste your Anthropic API key (sk-ant-...):","");
    if(k&&k.trim().startsWith("sk-ant-")){localStorage.setItem("fzk_ak",k.trim());alert("✅ Key saved!");}
    else if(k){alert("Invalid — must start with sk-ant-");}
  }

  if(!clients) return (
    <div style={{minHeight:"100vh",background:R,display:"flex",flexDirection:"column",
      alignItems:"center",justifyContent:"center",gap:16}}>
      <div style={{fontSize:32,fontWeight:900,color:W,letterSpacing:-1}}>FZK Media</div>
      <div style={{width:28,height:28,border:`3px solid ${W}`,borderTopColor:"transparent",
        borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <div style={{fontSize:13,color:"rgba(255,255,255,0.7)"}}>Loading tracker…</div>
    </div>
  );

  const today  = new Date();
  const syncTxt = {saving:"Saving…",synced:"● Synced"+(lastSave?" "+lastSave.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}):""),error:"⚠ Sync error",loading:""}[sync]||"";
  const syncClr = {saving:"rgba(255,255,255,0.6)",synced:"rgba(255,255,255,0.85)",error:"#FFD580",loading:"rgba(255,255,255,0.4)"}[sync];

  const totalOv  = clients.reduce((a,c)=>a+buildStages(c).filter(s=>s.status==="overdue").length,0);
  const totalDel = clients.filter(c=>elapsed(c.startDate)>(c.dur||30)).length;
  const alerts   = totalOv+totalDel;

  const filtered = clients.filter(c=>{
    if(search&&!c.name.toLowerCase().includes(search.toLowerCase())) return false;
    if(filter!=="all"&&c.group!==filter) return false;
    return true;
  });
  const grouped = groups.map(g=>({g,items:filtered.filter(c=>c.group===g)})).filter(x=>x.items.length>0);
  const extra   = filtered.filter(c=>!groups.includes(c.group));

  return (
    <div style={{minHeight:"100vh"}}>
      {/* ── Nav ── */}
      <div className="nav" style={{background:R,padding:"0 20px",display:"flex",alignItems:"center",
        justifyContent:"space-between",minHeight:56,position:"sticky",top:0,zIndex:500,
        boxShadow:`0 2px 12px ${R}55`,flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{fontSize:18,fontWeight:900,color:W,letterSpacing:-0.5}}>FZK Media</div>
          <div style={{width:1,height:18,background:"rgba(255,255,255,0.3)"}}/>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:"rgba(255,255,255,0.9)"}}>Cycle Tracker</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.55)"}}>
              {today.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short",year:"numeric"})}
              {" · "}<span style={{color:syncClr}}>{syncTxt}</span>
            </div>
          </div>
        </div>
        <div className="nav-r" style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          <button onClick={()=>setShowGrp(true)} style={{padding:"7px 12px",background:"rgba(255,255,255,0.12)",
            border:"1.5px solid rgba(255,255,255,0.2)",borderRadius:8,color:W,fontSize:12,fontWeight:600}}>
            ⚙ Groups
          </button>
          <button onClick={()=>setShowRpt(true)} style={{padding:"7px 12px",
            background:alerts>0?"rgba(255,255,255,0.92)":"rgba(255,255,255,0.12)",
            border:"1.5px solid rgba(255,255,255,0.25)",borderRadius:8,
            color:alerts>0?R:W,fontSize:12,fontWeight:700}}>
            📧 {alerts>0?`${alerts} Alerts`:"Report"}
          </button>
          <button onClick={()=>setShowAI(s=>!s)} style={{padding:"7px 12px",
            background:showAI?W:"rgba(255,255,255,0.12)",border:"1.5px solid rgba(255,255,255,0.25)",
            borderRadius:8,color:showAI?R:W,fontSize:12,fontWeight:700}}>✦ AI</button>
          <button onClick={updateKey} style={{padding:"7px 10px",background:"rgba(255,255,255,0.1)",
            border:"1.5px solid rgba(255,255,255,0.2)",borderRadius:8,color:W,fontSize:12}} title="Update API Key">🔑</button>
          <button onClick={addClient} style={{padding:"7px 14px",background:W,border:"none",
            borderRadius:8,color:R,fontSize:12,fontWeight:800,boxShadow:"0 2px 8px rgba(0,0,0,0.15)"}}>
            + Add
          </button>
        </div>
      </div>

      {/* ── Main ── */}
      <div className="main" style={{maxWidth:view==="calendar"?1000:860,margin:"0 auto",padding:"24px 20px",overflowX:"hidden"}}>

        {/* Stats */}
        <div className="stats" style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:20}}>
          {[
            {l:"Total",    v:clients.length,   c:R},
            {l:"Active",   v:clients.filter(c=>c.group==="Active").length, c:GR},
            {l:"Onboarding",v:clients.filter(c=>c.type==="onboarding").length,c:PU},
            {l:"Overdue",  v:totalOv,   c:totalOv>0?R:G3},
            {l:"Delayed",  v:totalDel,  c:totalDel>0?OR:G3},
          ].map(s=>(
            <div key={s.l} style={{background:W,border:`1.5px solid ${G1}`,borderRadius:12,
              padding:"12px 14px",boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
              <div style={{fontSize:22,fontWeight:900,color:s.c}}>{s.v}</div>
              <div style={{fontSize:10,color:G5,marginTop:2,fontWeight:600}}>{s.l}</div>
            </div>
          ))}
        </div>

        {/* View toggle + search + filter */}
        <div className="vrow" style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>
          <div style={{display:"flex",borderRadius:9,overflow:"hidden",border:`1.5px solid ${G3}`,flexShrink:0}}>
            {[["tracker","📋 Tracker"],["calendar","📅 Calendar"]].map(([v,l])=>(
              <button key={v} onClick={()=>setView(v)}
                style={{padding:"8px 14px",fontSize:12,fontWeight:view===v?700:500,border:"none",cursor:"pointer",
                  background:view===v?R:W,color:view===v?W:G7}}>{l}</button>
            ))}
          </div>
          {view==="tracker"&&(
            <>
              <input className="vsearch" placeholder="🔍  Search clients…" value={search}
                onChange={e=>setSearch(e.target.value)}
                style={{...iS,flex:1,minWidth:160,padding:"9px 13px"}}/>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {["all",...groups].map(g=>(
                  <button key={g} onClick={()=>setFilter(g)}
                    style={{padding:"7px 11px",borderRadius:8,fontSize:11,cursor:"pointer",
                      fontWeight:filter===g?700:500,
                      background:filter===g?RL:W,
                      border:`1.5px solid ${filter===g?RM:G3}`,
                      color:filter===g?RD:G7}}>
                    {g==="all"?"All":g}
                  </button>
                ))}
              </div>
            </>
          )}
        </div>

        {/* Legend */}
        <div className="legend" style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap",
          padding:"9px 14px",background:W,borderRadius:10,border:`1.5px solid ${G1}`,alignItems:"center",
          boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
          {(view==="tracker"?CY_STAGES:CY_STAGES).map(s=>(
            <div key={s.key} style={{display:"flex",alignItems:"center",gap:4}}>
              <span style={{width:7,height:7,borderRadius:2,background:s.color,display:"inline-block"}}/>
              <span style={{fontSize:10,color:G5,fontWeight:500}}>{s.label}</span>
            </div>
          ))}
          <div style={{marginLeft:"auto",display:"flex",gap:10}}>
            {[{l:"Done ✓",c:GR},{l:"Active",c:GR},{l:"Upcoming",c:G5},{l:"Overdue",c:R}].map(s=>(
              <span key={s.l} style={{fontSize:10,color:s.c,display:"flex",alignItems:"center",gap:3,fontWeight:500}}>
                <span style={{width:5,height:5,borderRadius:"50%",background:s.c,display:"inline-block"}}/>
                {s.l}
              </span>
            ))}
          </div>
        </div>

        {/* Calendar */}
        {view==="calendar"&&<CalView clients={clients}/>}

        {/* Tracker */}
        {view==="tracker"&&(
          filtered.length===0
            ? <div style={{textAlign:"center",padding:"60px 20px",color:G3,border:`2px dashed ${G1}`,
                borderRadius:16,background:W}}>
                <div style={{fontSize:32,marginBottom:10}}>◎</div>
                <div style={{fontSize:14,color:G5}}>{search?"No clients match":"No clients yet"}</div>
              </div>
            : <div style={{display:"flex",flexDirection:"column",gap:22}}>
                {grouped.map(({g,items})=>{
                  const isDrop=dragOver===g;
                  return (
                    <div key={g}
                      onDragOver={e=>{e.preventDefault();setDragOver(g);}}
                      onDrop={e=>{e.preventDefault();if(dragId!==null)upd(dragId,{group:g});setDragId(null);setDragOver(null);}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,
                        padding:isDrop?"8px 12px":"0",background:isDrop?RL:"transparent",
                        borderRadius:9,border:isDrop?`1.5px dashed ${R}`:"1.5px solid transparent",
                        transition:"all 0.15s"}}>
                        <span style={{fontSize:14}}>{({"Onboarding":"🌱","Active":"⚡","Getting Started":"🚀","OG Client":"⭐","To Start":"📋"})[g]||"●"}</span>
                        <span style={{fontSize:11,letterSpacing:1.5,textTransform:"uppercase",color:R,fontWeight:800}}>{g}</span>
                        <span style={{fontSize:11,color:G5,background:G1,padding:"1px 8px",borderRadius:99}}>{items.length}</span>
                        <div style={{flex:1,height:1.5,background:G1}}/>
                        {isDrop&&<span style={{fontSize:11,color:R,fontWeight:600}}>Drop here</span>}
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:8}}>
                        {items.map(c=>(
                          <Card key={c.id} client={c}
                            onUpdate={d=>upd(c.id,d)} onDelete={()=>del(c.id)}
                            groups={groups} isDrag={dragId===c.id}
                            onDragStart={(e,id)=>{setDragId(id);e.dataTransfer.effectAllowed="move";}}
                            onDragEnd={()=>{setDragId(null);setDragOver(null);}}/>
                        ))}
                      </div>
                    </div>
                  );
                })}
                {extra.length>0&&(
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                      <span style={{fontSize:11,letterSpacing:1.5,textTransform:"uppercase",color:G5,fontWeight:700}}>Other</span>
                      <div style={{flex:1,height:1.5,background:G1}}/>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      {extra.map(c=>(
                        <Card key={c.id} client={c}
                          onUpdate={d=>upd(c.id,d)} onDelete={()=>del(c.id)}
                          groups={groups} isDrag={dragId===c.id}
                          onDragStart={(e,id)=>{setDragId(id);e.dataTransfer.effectAllowed="move";}}
                          onDragEnd={()=>{setDragId(null);setDragOver(null);}}/>
                      ))}
                    </div>
                  </div>
                )}
              </div>
        )}

        <div style={{marginTop:36,textAlign:"center",fontSize:10,color:"#D1D5DB"}}>
          FZK Media · Cycle Tracker v5 · {today.toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})}
        </div>
      </div>

      {showAI&&<AIChat clients={clients} groups={groups} onClose={()=>setShowAI(false)}/>}
      {showGrp&&<GrpMgr groups={groups} onUpdate={setGroups} onClose={()=>setShowGrp(false)}/>}
      {showRpt&&<Report clients={clients} onClose={()=>setShowRpt(false)}/>}
    </div>
  );
}

// ── ROOT — password gate ───────────────────────────────────────────────
function Root(){
  const authed = localStorage.getItem("fzk_auth")==="1" && localStorage.getItem("fzk_av")===AUTH_V;
  const [ok,setOk] = useState(authed);
  function unlock(){
    localStorage.setItem("fzk_auth","1");
    localStorage.setItem("fzk_av",AUTH_V);
    setOk(true);
  }
  if(!ok) return <PwScreen onUnlock={unlock}/>;
  return <App/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
