const toStr   = d => new Date(d).toISOString().split("T")[0];
const addDays = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const fmtD    = d => new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short"});

// Strip markdown from AI responses
function cleanAI(text){
  return text
    .replace(/\*\*(.+?)\*\*/g,"$1")
    .replace(/\*(.+?)\*/g,"$1")
    .replace(/#+\s/g,"")
    .replace(/-/g,"-")
    .replace(/\u2014/g,"-")
    .replace(/\u2013/g,"-");
}

function getStatus(start,dur,done){
  if(done) return "done";
  const t=new Date();t.setHours(0,0,0,0);
  const s=new Date(start);s.setHours(0,0,0,0);
  const e=addDays(s,dur);e.setHours(0,0,0,0);
  if(t<s) return "upcoming";
  if(t>=s&&t<e) return "active";
  return "overdue";
}

function buildStages(client){
  const tpl = client.type==="onboarding" ? OB_STAGES : CY_STAGES;
  const base = new Date(client.startDate);
  return tpl.map(s=>{
    const aStart=addDays(base,s.d), aEnd=addDays(aStart,s.dur);
    const start=client.ov?.[s.key+"_s"]?new Date(client.ov[s.key+"_s"]):aStart;
    const end=client.ov?.[s.key+"_e"]?new Date(client.ov[s.key+"_e"]):aEnd;
    const done=!!(client.checks?.[s.key]);
    const days=Math.max(1,daysBetween(start,end));
    return {...s,start,end,aStart,aEnd,done,dur:days,
      status:getStatus(start,days,done),
      sOv:!!client.ov?.[s.key+"_s"],eOv:!!client.ov?.[s.key+"_e"]};
  });
}

// ── CONFETTI ───────────────────────────────────────────────────────
function Confetti({onDone}){
  const pieces=Array.from({length:12},(_,i)=>({id:i,x:Math.random()*100,color:[R,"#FFD700","#26DE81","#2563EB","#7C3AED","#FF6B6B"][i%6]}));
  useEffect(()=>{const t=setTimeout(onDone,1200);return()=>clearTimeout(t);},[]);
  return (
    <div style={{position:"absolute",top:0,left:0,right:0,height:0,pointerEvents:"none",overflow:"visible",zIndex:10}}>
      {pieces.map(p=>(
        <div key={p.id} style={{position:"absolute",left:`${p.x}%`,top:0,width:8,height:8,
          borderRadius:p.id%2?"50%":"2px",background:p.color,
          animation:`confetti 1.1s ${p.id*0.05}s ease-out forwards`}}/>
      ))}
    </div>
  );
}

// ── DATE FIELD ─────────────────────────────────────────────────────
function DateFld({autoDate,ovKey,ovMap,onOv}){
  const [ed,setEd]=useState(false);
  const isOv=!!(ovMap?.[ovKey]);
  const val=isOv?ovMap[ovKey]:toStr(autoDate);
  if(ed) return (
    <input type="date" defaultValue={val} autoFocus
      onBlur={e=>{if(e.target.value)onOv(ovKey,e.target.value);setEd(false);}}
      style={{...iS,fontSize:11,padding:"2px 6px",width:120}}/>
  );
  return (
    <span onClick={()=>setEd(true)} style={{fontSize:11,fontFamily:"monospace",cursor:"pointer",
      color:isOv?R:G5,borderBottom:`1px dashed ${isOv?R:"transparent"}`,
      display:"inline-flex",alignItems:"center",gap:3}}>
      {fmtD(val)}
      {isOv?<span onClick={e=>{e.stopPropagation();onOv(ovKey,null);}} style={{color:G3,fontSize:9}}>↺</span>
           :<span style={{color:G3,fontSize:9}}>✎</span>}
    </span>
  );
}

// ── CHECKBOX ───────────────────────────────────────────────────────
function CB({checked,color,onChange,size=20}){
  return (
    <div onClick={e=>{e.stopPropagation();onChange(!checked);}} style={{
      width:size,height:size,borderRadius:size*0.3,flexShrink:0,cursor:"pointer",
      border:`2px solid ${checked?color:G3}`,background:checked?color:W,
      display:"flex",alignItems:"center",justifyContent:"center",
      transition:"all 0.15s",boxShadow:checked?`0 0 0 3px ${color}18`:"none"}}>
      {checked&&<span style={{color:W,fontSize:size*0.55,fontWeight:900,lineHeight:1}}>✓</span>}
    </div>
  );
}

// ── SUB-TASKS ──────────────────────────────────────────────────────
function SubTasks({stageKey,tasks,onUpdate,color}){
  const [newTask,setNewTask]=useState("");
  const [adding,setAdding]=useState(false);
  const stageTasks=tasks?.[stageKey]||[];
  function addTask(){
    if(!newTask.trim()) return;
    const updated=[...stageTasks,{id:Date.now(),label:newTask.trim(),done:false}];
    onUpdate(stageKey,updated);
    setNewTask("");setAdding(false);
  }
  function toggleTask(id){
    onUpdate(stageKey,stageTasks.map(t=>t.id===id?{...t,done:!t.done}:t));
  }
  function removeTask(id){
    onUpdate(stageKey,stageTasks.filter(t=>t.id!==id));
  }
  return (
    <div style={{marginTop:8,paddingLeft:29}}>
      {stageTasks.map(t=>(
        <div key={t.id} style={{display:"flex",alignItems:"center",gap:7,padding:"4px 0",
          borderBottom:`1px solid ${G1}`,marginBottom:2}}>
          <CB checked={t.done} color={color} onChange={()=>toggleTask(t.id)} size={15}/>
          <span style={{fontSize:12,color:t.done?G4:G7,flex:1,textDecoration:t.done?"line-through":"none"}}>{t.label}</span>
          <button onClick={()=>removeTask(t.id)} style={{background:"none",border:"none",cursor:"pointer",color:G3,fontSize:12,padding:"0 2px",lineHeight:1}}>×</button>
        </div>
      ))}
      {adding?(
        <div style={{display:"flex",gap:6,marginTop:6}}>
          <input value={newTask} onChange={e=>setNewTask(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter")addTask();if(e.key==="Escape"){setAdding(false);setNewTask("");}}}
            placeholder="Add task…" autoFocus
            style={{...iS,flex:1,fontSize:12,padding:"5px 8px"}}/>
          <button onClick={addTask} style={{padding:"5px 10px",background:color,border:"none",borderRadius:7,color:W,fontSize:12,fontWeight:700,cursor:"pointer"}}>Add</button>
          <button onClick={()=>{setAdding(false);setNewTask("");}} style={{padding:"5px 8px",background:G1,border:"none",borderRadius:7,color:G5,fontSize:12,cursor:"pointer"}}>✕</button>
        </div>
      ):(
        <button onClick={()=>setAdding(true)} style={{marginTop:5,fontSize:11,color:G4,background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:4,padding:"2px 0"}}>
          <span style={{fontSize:14,lineHeight:1}}>+</span> Add task
        </button>
      )}
    </div>
  );
}

// ── POSTING PLAN ───────────────────────────────────────────────────
function PostPlan({client,onUpdate}){
  if(!client.pieces||client.pieces<1)
    return <div style={{fontSize:11,color:G3,fontStyle:"italic",marginTop:6,paddingLeft:29}}>Add piece count to see posting plan</div>;
  const today=new Date();today.setHours(0,0,0,0);
  const slots=Array.from({length:client.pieces},(_,i)=>{
    const auto=addDays(new Date(client.startDate),Math.round((i/client.pieces)*(client.dur||30)));
    const ov=client.pd?.[`p${i+1}`];
    const done=!!(client.pd?.[`p${i+1}_done`]);
    return {i,auto,date:ov?new Date(ov):auto,isOv:!!ov,done};
  });
  function setPD(k,v){const pd={...(client.pd||{})};if(!v)delete pd[k];else pd[k]=v;onUpdate({...client,pd});}
  function toggleDone(i){const k=`p${i+1}_done`;const pd={...(client.pd||{})};if(pd[k])delete pd[k];else pd[k]=true;onUpdate({...client,pd});}
  return (
    <div className="postplan" style={{paddingLeft:29,marginTop:8}}>
      <div style={{fontSize:10,color:G4,fontWeight:600,marginBottom:7,letterSpacing:0.4}}>POSTING SCHEDULE - tap date to edit</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {slots.map(s=>{
          const past=s.date<today;
          return (
            <div key={s.i} style={{background:s.done?GB:past?BB:G0,
              border:`1.5px solid ${s.done?"#86EFAC":s.isOv?R:past?"#93C5FD":G2}`,
              borderRadius:8,padding:"5px 10px",display:"flex",alignItems:"center",gap:6}}>
              <div onClick={()=>toggleDone(s.i)} style={{width:15,height:15,borderRadius:4,flexShrink:0,cursor:"pointer",
                border:`2px solid ${s.done?GR:G3}`,background:s.done?GR:W,
                display:"flex",alignItems:"center",justifyContent:"center"}}>
                {s.done&&<span style={{color:W,fontSize:9,fontWeight:900,lineHeight:1}}>✓</span>}
              </div>
              <span style={{fontSize:10,fontWeight:600,color:s.done?GR:past?BL:G7,textDecoration:s.done?"line-through":"none"}}>P{s.i+1}</span>
              <DateFld autoDate={s.auto} ovKey={`p${s.i+1}`} ovMap={client.pd||{}} onOv={(k,v)=>setPD(k,v)}/>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── CLIENT CARD ────────────────────────────────────────────────────
function Card({client,onUpdate,onDelete,groups,isDrag,onDragStart,onDragEnd}){
  const [open,setOpen]=useState(false);
  const [tab,setTab]=useState("timeline"); // timeline | posting | notes
  const [showConfetti,setShowConfetti]=useState(false);
  const stages=useMemo(()=>buildStages(client),[client.startDate,client.type,JSON.stringify(client.checks),JSON.stringify(client.ov)]);

  const dur=client.dur||30;
  const el=elapsed(client.startDate);
  const delayed=el>dur;
  const dLeft=dur-el;
  const isOB=client.type==="onboarding";
  const phC=isOB?PU:R;

  const total=stages.length;
  const doneN=stages.filter(s=>s.done).length;
  const progress=total>0?Math.round((doneN/total)*100):0;
  const overdue=stages.filter(s=>s.status==="overdue").length;
  const active=stages.filter(s=>s.status==="active").length;
  const allDone=doneN===total&&total>0;

  // fire confetti when newly complete
  const prevDoneRef=useRef(allDone);
  useEffect(()=>{if(!prevDoneRef.current&&allDone)setShowConfetti(true);prevDoneRef.current=allDone;},[allDone]);

  const SC={done:{label:"Done",bg:GB,border:"#BBF7D0",text:GR},active:{label:"Active",bg:"#f0fdf4",border:"#86EFAC",text:GR},upcoming:{label:"Upcoming",bg:G0,border:G2,text:G4},overdue:{label:"Overdue",bg:RL,border:RM,text:RD}};

  function ov(key,val){const o={...(client.ov||{})};if(val===null)delete o[key];else o[key]=val;onUpdate({...client,ov:o});}
  function updateTasks(stageKey,tasks){onUpdate({...client,tasks:{...(client.tasks||{}),[stageKey]:tasks}});}

  return (
    <div draggable onDragStart={e=>onDragStart(e,client.id)} onDragEnd={onDragEnd}
      className="fade-up" style={{position:"relative",
        background:W,
        border:`1px solid ${delayed?RM:open?G2:G1}`,
        borderRadius:14,overflow:"hidden",
        boxShadow:open?"0 2px 16px rgba(0,0,0,0.06)":"0 1px 3px rgba(0,0,0,0.04)",
        opacity:isDrag?0.4:1,cursor:"grab",transition:"box-shadow 0.2s,border-color 0.2s"}}>

      {showConfetti&&<Confetti onDone={()=>setShowConfetti(false)}/>}

      {/* Slim color accent - only a top stripe, not a full left border */}
      <div style={{height:3,background:delayed?`linear-gradient(90deg,${R},${OR})`:`linear-gradient(90deg,${phC}88,${phC}22)`,transition:"background 0.3s"}}/>

      {/* Header */}
      <div className="chdr" style={{padding:"13px 16px",display:"flex",alignItems:"center",gap:11,userSelect:"none"}}
        onClick={()=>setOpen(o=>!o)}>
        <span style={{color:G3,fontSize:13,flexShrink:0,cursor:"grab"}}>⠿</span>
        <div className="cavatar" style={{width:36,height:36,borderRadius:9,flexShrink:0,
          background:isOB?PB:G1,display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:14,fontWeight:800,color:isOB?PU:G7}}>
          {client.name.charAt(0).toUpperCase()}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <span style={{fontSize:14,fontWeight:700,color:BK}}>{client.name}</span>
            <span style={{fontSize:10,padding:"1px 6px",borderRadius:20,background:isOB?PB:G1,color:isOB?PU:G5,fontWeight:600}}>
              {isOB?"Onboarding":client.phase||"Cycle"}
            </span>
            {delayed&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:20,background:RL,color:RD,fontWeight:600}}>⚠ {el-dur}d over</span>}
            {!delayed&&overdue>0&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:20,background:RL,color:RD}}>{overdue} overdue</span>}
            {active>0&&!allDone&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:20,background:GB,color:GR}}>{active} active</span>}
            {allDone&&<span className="pop-in" style={{fontSize:10,padding:"1px 6px",borderRadius:20,background:GB,color:GR,fontWeight:700}}>✓ Complete 🎉</span>}
          </div>
          <div style={{fontSize:11,color:G4,marginTop:2}}>
            {fmtD(client.startDate)} to {fmtD(addDays(new Date(client.startDate),dur))}
            {" · "}
            <span style={{color:delayed?R:dLeft<=5&&dLeft>0?OR:G4,fontWeight:delayed?700:400}}>
              {delayed?`${el}d (${dur} planned)`:dLeft>0?`${dLeft}d left`:`Day ${dur}`}
            </span>
            {client.pieces>0&&` · ${client.pieces} pieces`}
          </div>
        </div>
        <div className="cprog" style={{width:76,flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{fontSize:9,color:G4}}>{doneN}/{total}</span>
            <span style={{fontSize:9,color:progress===100?GR:G5,fontWeight:600}}>{progress}%</span>
          </div>
          <div style={{height:4,background:G1,borderRadius:99,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${progress}%`,
              background:progress===100?GR:`linear-gradient(90deg,${phC},${phC}aa)`,
              borderRadius:99,transition:"width 0.4s"}}/>
          </div>
        </div>
        <span style={{color:G3,fontSize:11,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s",flexShrink:0}}>▼</span>
      </div>

      {/* Expanded */}
      {open&&(
        <div className="cexp" style={{borderTop:`1px solid ${G1}`,background:G0}}>
          {/* Edit fields */}
          <div className="cedit" style={{display:"flex",gap:10,padding:"12px 16px",flexWrap:"wrap",alignItems:"flex-end",borderBottom:`1px solid ${G1}`,background:W}}>
            <div>
              <label style={lS}>Type</label>
              <div style={{display:"flex",borderRadius:8,overflow:"hidden",border:`1.5px solid ${G2}`}}>
                {["cycle","onboarding"].map(t=>(
                  <button key={t} onClick={e=>{e.stopPropagation();onUpdate({...client,type:t,checks:{},ov:{},pd:{},tasks:{}});}}
                    style={{padding:"5px 11px",fontSize:12,fontWeight:600,border:"none",cursor:"pointer",
                      background:client.type===t?(t==="onboarding"?PU:R):W,
                      color:client.type===t?W:G5}}>
                    {t==="cycle"?"Cycle":"Onboarding"}
                  </button>
                ))}
              </div>
            </div>
            {[{l:"Name",k:"name",t:"text",w:160},{l:"Phase",k:"phase",t:"text",w:55},{l:"Start",k:"startDate",t:"date",w:135},{l:"Duration",k:"dur",t:"number",w:75},{l:"Pieces",k:"pieces",t:"number",w:62}].map(f=>(
              <div key={f.k}>
                <label style={lS}>{f.l}</label>
                <input type={f.t} value={client[f.k]??""} placeholder={f.t==="number"?"30":""}
                  onChange={e=>onUpdate({...client,[f.k]:f.t==="number"?(parseInt(e.target.value)||0):e.target.value})}
                  onClick={e=>e.stopPropagation()} style={{...iS,width:f.w}}/>
              </div>
            ))}
            {delayed&&<div><label style={lS}>Actual days</label><input type="number" value={client.actualDays??el} min={dur} onChange={e=>onUpdate({...client,actualDays:parseInt(e.target.value)||null})} style={{...iS,width:86,borderColor:R}}/></div>}
            <div>
              <label style={lS}>Group</label>
              <select value={client.group} onChange={e=>onUpdate({...client,group:e.target.value})} onClick={e=>e.stopPropagation()} style={{...iS,width:148,cursor:"pointer"}}>
                {groups.map(g=><option key={g} value={g}>{g}</option>)}
              </select>
            </div>
            <button onClick={e=>{e.stopPropagation();onDelete();}} style={{padding:"6px 12px",background:RL,border:`1px solid ${RM}`,borderRadius:8,color:RD,cursor:"pointer",fontSize:12,marginLeft:"auto"}}>Remove</button>
          </div>

          {/* Tab bar */}
          <div style={{display:"flex",gap:0,borderBottom:`1px solid ${G1}`,background:W,padding:"0 16px"}}>
            {[["timeline","Timeline"],["posting","Posting"],["notes","Notes"]].map(([t,l])=>(
              <button key={t} onClick={()=>setTab(t)} style={{padding:"10px 14px",fontSize:12,fontWeight:tab===t?700:500,border:"none",cursor:"pointer",background:"none",color:tab===t?BK:G5,borderBottom:tab===t?`2px solid ${R}`:"2px solid transparent",marginBottom:-1,transition:"color 0.15s"}}>
                {l}
              </button>
            ))}
          </div>

          <div style={{padding:"14px 16px"}}>
            {/* TIMELINE TAB */}
            {tab==="timeline"&&(
              <>
                {/* Mini timeline bar */}
                <div style={{display:"flex",height:4,borderRadius:99,overflow:"hidden",marginBottom:14,background:G1}}>
                  {stages.map(s=><div key={s.key} style={{flex:s.dur,background:s.done?GR:s.color,opacity:s.status==="upcoming"?0.2:s.status==="done"?0.6:1}}/>)}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:5}}>
                  {stages.map(s=>{
                    const sc=SC[s.status];
                    const stageTasks=client.tasks?.[s.key]||[];
                    const tasksDone=stageTasks.filter(t=>t.done).length;
                    return (
                      <div key={s.key} style={{background:sc.bg,border:`1px solid ${sc.border}`,borderRadius:10,padding:"9px 13px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                          <CB checked={s.done} color={s.color} onChange={v=>onUpdate({...client,checks:{...(client.checks||{}),[s.key]:v}})}/>
                          <span style={{fontSize:13,fontWeight:600,color:s.done?G4:BK,flex:1,textDecoration:s.done?"line-through":"none",minWidth:100}}>{s.label}</span>
                          {stageTasks.length>0&&<span style={{fontSize:10,color:G4,background:G1,padding:"1px 6px",borderRadius:20}}>{tasksDone}/{stageTasks.length}</span>}
                          <div className="stageDates" style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                            <span style={{fontSize:10,color:G4}}>From:</span>
                            <DateFld autoDate={s.aStart} ovKey={s.key+"_s"} ovMap={client.ov||{}} onOv={ov}/>
                            <span style={{fontSize:10,color:G3}}>to</span>
                            <DateFld autoDate={s.aEnd} ovKey={s.key+"_e"} ovMap={client.ov||{}} onOv={ov}/>
                          </div>
                          <span style={{fontSize:10,padding:"1px 8px",borderRadius:20,fontWeight:500,
                            background:s.done?GB:s.status==="active"?GB:s.status==="overdue"?RL:G1,
                            color:sc.text,whiteSpace:"nowrap"}}>{sc.label}</span>
                        </div>
                        <SubTasks stageKey={s.key} tasks={client.tasks||{}} onUpdate={updateTasks} color={s.color}/>
                      </div>
                    );
                  })}
                </div>
                {delayed&&<div style={{marginTop:10,padding:"9px 13px",background:RL,border:`1px solid ${RM}`,borderRadius:10,fontSize:12,color:RD,display:"flex",gap:7,alignItems:"center"}}><span>⚠</span><span>This {isOB?"onboarding":"cycle"} is <strong>{el-dur} days over</strong> the {dur}-day plan.</span></div>}
              </>
            )}
            {/* POSTING TAB */}
            {tab==="posting"&&(
              <div>
                <div style={{fontSize:12,color:G5,marginBottom:10}}>Posting dates spread across {dur} days. Tick each post when published.</div>
                <PostPlan client={client} onUpdate={onUpdate}/>
              </div>
            )}
            {/* NOTES TAB */}
            {tab==="notes"&&(
              <div>
                <label style={lS}>Notes</label>
                <textarea value={client.notes||""} onChange={e=>onUpdate({...client,notes:e.target.value})}
                  placeholder="Add client notes, context, reminders…" rows={5}
                  style={{...iS,width:"100%",resize:"vertical",fontSize:13,lineHeight:1.6,marginTop:4}}/>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ── AI CHAT ────────────────────────────────────────────────────────
function AIChat({clients,groups,onClose}){
  const [msgs,setMsgs]=useState([{role:"assistant",content:"Hi! I know all your FZK Media clients. Ask me anything - who is overdue, what to focus on this week, or a specific client status."}]);
  const [inp,setInp]=useState("");
  const [load,setLoad]=useState(false);
  const botRef=useRef(null);
  useEffect(()=>{botRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);

  async function send(){
    if(!inp.trim()||load) return;
    const um={role:"user",content:inp.trim()};
    setMsgs(m=>[...m,um]);setInp("");setLoad(true);
    const today=new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
    const data=clients.map(c=>{
      const stgs=buildStages(c);
      return {name:c.name,type:c.type,phase:c.phase,group:c.group,startDate:c.startDate,dur:c.dur||30,pieces:c.pieces,daysElapsed:elapsed(c.startDate),isDelayed:elapsed(c.startDate)>(c.dur||30),notes:c.notes||"",stages:stgs.map(s=>({name:s.label,status:s.status,start:toStr(s.start),done:s.done}))};
    });
    const sys=`You are the internal assistant for FZK Media. Today is ${today}. FZK manages Instagram and LinkedIn for founders, mainly storytelling reels. Onboarding is 30 days, then Cycle 1 starts on day 31, followed by C2 and C3 over roughly 4 months total. Groups: ${groups.join(", ")}. Client data: ${JSON.stringify(data)}. Respond naturally and conversationally. No markdown formatting, no asterisks, no em dashes. Use plain text only. Be specific and concise. When listing items, use a simple numbered list or line breaks, not bullet points with asterisks.`;
    try{
      const all=[...msgs,um].filter(m=>m.role==="user"||m.role==="assistant");
      let i=0;while(i<all.length&&all[i].role==="assistant")i++;
      const apiMsgs=all.slice(i).map(m=>({role:m.role,content:m.content}));
      if(!apiMsgs.length||apiMsgs[0].role!=="user") apiMsgs.unshift({role:"user",content:um.content});
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":getKey(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:800,system:sys,messages:apiMsgs})});
      const d=await res.json();
      if(d.error) throw new Error(d.error.message);
      const raw=d.content?.[0]?.text||"No response.";
      setMsgs(m=>[...m,{role:"assistant",content:cleanAI(raw)}]);
    } catch(e){setMsgs(m=>[...m,{role:"assistant",content:`Could not get a response: ${e.message}. Check your API key (tap the key icon in the nav).`}]);}
    finally{setLoad(false);}
  }

  return (
    <div className="ai-panel" style={{position:"fixed",right:0,top:0,bottom:0,width:380,background:W,boxShadow:"-2px 0 20px rgba(0,0,0,0.1)",zIndex:1000,display:"flex",flexDirection:"column"}}>
      <div style={{padding:"14px 18px",background:R,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:14,fontWeight:800,color:W}}>FZK AI</div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.6)"}}>Knows all your clients</div>
        </div>
        <button onClick={onClose} style={{background:"rgba(255,255,255,0.15)",border:"none",cursor:"pointer",fontSize:15,color:W,borderRadius:8,padding:"4px 10px"}}>✕</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"14px 18px",display:"flex",flexDirection:"column",gap:10}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            <div style={{maxWidth:"85%",padding:"9px 13px",fontSize:13,lineHeight:1.65,whiteSpace:"pre-wrap",
              borderRadius:m.role==="user"?"13px 13px 3px 13px":"13px 13px 13px 3px",
              background:m.role==="user"?R:G0,border:m.role==="user"?"none":`1px solid ${G1}`,
              color:m.role==="user"?W:BK}}>{m.content}</div>
          </div>
        ))}
        {load&&<div style={{display:"flex",gap:4,padding:"9px 13px",background:G0,border:`1px solid ${G1}`,borderRadius:"13px 13px 13px 3px",width:"fit-content"}}>
          {[0,1,2].map(i=><div key={i} style={{width:5,height:5,borderRadius:"50%",background:G3,animation:`bounce 1s ${i*0.15}s infinite`}}/>)}
        </div>}
        <div ref={botRef}/>
      </div>
      <div style={{padding:"0 14px 8px",display:"flex",gap:5,flexWrap:"wrap"}}>
        {["Who's overdue?","Who's delayed?","This week","Anshita's status"].map(q=>(
          <button key={q} onClick={()=>setInp(q)} style={{fontSize:10,padding:"3px 9px",borderRadius:20,border:`1px solid ${G2}`,background:G0,color:G7,cursor:"pointer"}}>{q}</button>
        ))}
      </div>
      <div style={{padding:"10px 14px",borderTop:`1px solid ${G1}`,display:"flex",gap:8}}>
        <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Ask anything…" style={{...iS,flex:1}}/>
        <button onClick={send} disabled={load||!inp.trim()} style={{padding:"8px 14px",background:R,border:"none",borderRadius:9,color:W,fontSize:13,fontWeight:700,cursor:"pointer",opacity:load||!inp.trim()?0.5:1}}>Send</button>
      </div>
    </div>
  );
}

// ── CALENDAR ───────────────────────────────────────────────────────
function CalView({clients}){
  const [wk,setWk]=useState(0);
  const [sel,setSel]=useState(null);
  const today=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d;},[]);
  const wkStart=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);const day=d.getDay();d.setDate(d.getDate()-(day===0?6:day-1)+wk*7);return d;},[wk]);
  const days=Array.from({length:7},(_,i)=>addDays(wkStart,i));

  const byDay=useMemo(()=>{
    const m={};days.forEach(d=>{m[d.toDateString()]=[];});
    clients.forEach(c=>{
      buildStages(c).forEach(s=>{
        days.forEach(d=>{
          const dd=new Date(d);dd.setHours(0,0,0,0);
          const ss=new Date(s.start);ss.setHours(0,0,0,0);
          const ee=new Date(s.end);ee.setHours(0,0,0,0);
          if(dd>=ss&&dd<ee) m[d.toDateString()].push({client:c.name,stage:s.label,status:s.status,color:s.color,done:s.done});
        });
      });
      if(c.pieces>0){
        const dur=c.dur||30;
        Array.from({length:c.pieces},(_,i)=>{
          const ov=c.pd?.[`p${i+1}`];
          const dt=ov?new Date(ov):addDays(new Date(c.startDate),Math.round((i/c.pieces)*dur));
          const ds=dt.toDateString();
          if(m[ds]!==undefined) m[ds].push({client:c.name,stage:`Post P${i+1}`,status:"posting",color:BL,done:!!(c.pd?.[`p${i+1}_done`])});
        });
      }
    });
    return m;
  },[clients,wkStart]);

  const btnS={padding:"7px 12px",background:W,border:`1px solid ${G2}`,borderRadius:8,fontSize:12,color:G7,cursor:"pointer"};
  const selTasks=sel?(byDay[sel.toDateString()]||[]):(byDay[today.toDateString()]||[]);
  const selIsSun=sel?sel.getDay()===0:today.getDay()===0;
  const dispDate=sel||today;

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <button onClick={()=>setWk(w=>w-1)} style={btnS}>← Prev</button>
        <span style={{fontSize:13,fontWeight:700,color:BK,textAlign:"center"}}>
          {fmtFull(wkStart)} - {fmtFull(days[6])}
          {wk===0&&<span style={{fontSize:11,marginLeft:6,color:R,fontWeight:600}}>This week</span>}
        </span>
        <button onClick={()=>setWk(w=>w+1)} style={btnS}>Next →</button>
      </div>
      {wk!==0&&<button onClick={()=>{setWk(0);setSel(null);}} style={{...btnS,marginBottom:12,fontSize:11}}>Today</button>}

      {/* 7-day grid - all days always visible */}
      <div className="cal-grid" style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6,marginBottom:12}}>
        {days.map(d=>{
          const isT=d.toDateString()===today.toDateString();
          const isSel=sel&&d.toDateString()===sel.toDateString();
          const isSun=d.getDay()===0;
          const tasks=byDay[d.toDateString()]||[];
          return (
            <div key={d.toDateString()} className="cal-day"
              onClick={()=>setSel(p=>p&&p.toDateString()===d.toDateString()?null:new Date(d))}
              style={{background:isSel?RL:isT?"#FFF5F5":W,border:`1px solid ${isSel?R:isT?RM:G1}`,
                borderRadius:10,padding:"8px 6px",minHeight:90,cursor:"pointer",
                transition:"all 0.15s",boxShadow:isSel?`0 2px 8px ${R}22`:"none"}}>
              <div style={{marginBottom:5}}>
                <div style={{fontSize:9,color:isSel?R:isT?R:G4,fontWeight:700,textTransform:"uppercase",letterSpacing:0.3}}>
                  {d.toLocaleDateString("en-GB",{weekday:"short"})}
                </div>
                <div className="cal-daynum" style={{fontSize:16,fontWeight:800,color:isSel?R:isT?R:isSun?G3:BK,lineHeight:1.1}}>{d.getDate()}</div>
              </div>
              {isSun?<div style={{fontSize:8,color:G3,fontStyle:"italic"}}>🌙 Rest</div>
                :tasks.length===0?<div style={{fontSize:8,color:G2}}>-</div>
                :<div style={{display:"flex",flexDirection:"column",gap:2}}>
                  {tasks.slice(0,3).map((t,i)=>(
                    <div key={i} className="cal-event" style={{fontSize:9,padding:"2px 4px",borderRadius:4,lineHeight:1.25,
                      background:t.done?GB:t.status==="overdue"?RL:`${t.color}14`,
                      border:`1px solid ${t.done?"#BBF7D0":t.status==="overdue"?RM:`${t.color}33`}`,
                      color:t.done?GR:t.status==="overdue"?RD:G7,overflow:"hidden"}}>
                      <div style={{fontWeight:700,color:t.color,fontSize:8,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.client.split(" ")[0]}</div>
                      <div style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.stage}</div>
                    </div>
                  ))}
                  {tasks.length>3&&<div style={{fontSize:8,color:G4,fontWeight:600}}>+{tasks.length-3}</div>}

// ── DELAY REPORT ───────────────────────────────────────────────────
function Report({clients,onClose}){
  const today=new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  const delayed=clients.filter(c=>elapsed(c.startDate)>(c.dur||30));
  const overStages=clients.flatMap(c=>buildStages(c).filter(s=>s.status==="overdue").map(s=>({client:c.name,stage:s.label,daysOver:Math.floor((new Date()-s.end)/86400000)}))).sort((a,b)=>b.daysOver-a.daysOver);
  const onTrack=Math.max(0,clients.length-delayed.length-clients.filter(c=>buildStages(c).some(s=>s.status==="overdue")).length);
  function buildTxt(){let b=`FZK Media - Cycle Tracker Report\n${today}\n\n`;if(delayed.length){b+=`Delayed Cycles (${delayed.length})\n${"-".repeat(36)}\n`;delayed.forEach(c=>{const e=elapsed(c.startDate);b+=`${c.name}: ${e} days (${e-(c.dur||30)}d over)\n`;});b+="\n";}if(overStages.length){b+=`Overdue Stages (${overStages.length})\n${"-".repeat(36)}\n`;overStages.forEach(s=>{b+=`${s.client} / ${s.stage}: ${s.daysOver}d overdue\n`;});b+="\n";}if(!delayed.length&&!overStages.length)b+="All clients on track!\n";b+=`\nFZK Media Cycle Tracker`;return b;}
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",zIndex:1100,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:W,borderRadius:18,padding:26,width:"100%",maxWidth:500,maxHeight:"85vh",overflowY:"auto",boxShadow:"0 12px 40px rgba(0,0,0,0.18)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
          <div><div style={{fontSize:15,fontWeight:800,color:BK}}>Delay Report</div><div style={{fontSize:11,color:G5,marginTop:1}}>{today}</div></div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:G4}}>✕</button>
        </div>
        <div style={{display:"flex",gap:10,marginBottom:18}}>
          {[{l:"Delayed",v:delayed.length,c:delayed.length?RD:G4,bg:delayed.length?RL:G0},{l:"Overdue Stages",v:overStages.length,c:overStages.length?OR:G4,bg:overStages.length?OB:G0},{l:"On Track",v:onTrack,c:GR,bg:GB}].map(s=>(
            <div key={s.l} style={{flex:1,background:s.bg,borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:800,color:s.c}}>{s.v}</div>
              <div style={{fontSize:10,color:G5,marginTop:1}}>{s.l}</div>
            </div>
          ))}
        </div>
        {delayed.length>0&&<div style={{marginBottom:12}}><div style={{fontSize:12,fontWeight:700,color:RD,marginBottom:7}}>Delayed</div>{delayed.map(c=>{const e=elapsed(c.startDate);return(<div key={c.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px",background:RL,border:`1px solid ${RM}`,borderRadius:9,marginBottom:4}}><span style={{fontSize:13,fontWeight:600,color:BK}}>{c.name}</span><span style={{fontSize:11,color:RD,fontWeight:500}}>{e}d (+{e-(c.dur||30)}d)</span></div>);})}</div>}
        {overStages.length>0&&<div style={{marginBottom:16}}><div style={{fontSize:12,fontWeight:700,color:OR,marginBottom:7}}>Overdue Stages</div>{overStages.map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px",background:OB,border:"1px solid #FDE68A",borderRadius:9,marginBottom:4}}><div><span style={{fontSize:13,fontWeight:600,color:BK}}>{s.client}</span><span style={{fontSize:12,color:G5,marginLeft:7}}>{s.stage}</span></div><span style={{fontSize:11,color:OR,fontWeight:500}}>{s.daysOver}d</span></div>)}</div>}
        {!delayed.length&&!overStages.length&&<div style={{textAlign:"center",padding:"18px",background:GB,border:"1px solid #BBF7D0",borderRadius:12,marginBottom:16}}><div style={{fontSize:24,marginBottom:6}}>✅</div><div style={{fontSize:13,fontWeight:700,color:GR}}>All clients on track!</div></div>}
        <pre style={{background:G0,border:`1px solid ${G1}`,borderRadius:10,padding:"12px 14px",fontSize:11,color:G7,lineHeight:1.7,whiteSpace:"pre-wrap",fontFamily:"monospace",maxHeight:130,overflowY:"auto",marginBottom:14}}>{buildTxt()}</pre>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>navigator.clipboard.writeText(buildTxt()).then(()=>alert("Copied!"))} style={{flex:1,padding:"10px",background:G0,border:`1px solid ${G2}`,borderRadius:10,cursor:"pointer",fontSize:13,color:G7,fontWeight:600}}>Copy</button>
          <button onClick={()=>window.open(`mailto:${EMAILS}?subject=${encodeURIComponent("FZK Media Report")}&body=${encodeURIComponent(buildTxt())}`)} style={{flex:2,padding:"10px",background:R,border:"none",borderRadius:10,cursor:"pointer",fontSize:13,color:W,fontWeight:700}}>Send to Team</button>
        </div>
      </div>
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────────
function App(){
  const [clients,setClients]=useState(null);
  const [groups,setGroups]=useState(DEF_GROUPS);
  const [nextId,setNextId]=useState(100);
  const [sync,setSync]=useState("loading");
  const [lastSave,setLastSave]=useState(null);
  const [view,setView]=useState("tracker");
  const [filter,setFilter]=useState("all");
  const [search,setSearch]=useState("");
  const [showAI,setShowAI]=useState(false);
  const [showGrp,setShowGrp]=useState(false);
  const [showRpt,setShowRpt]=useState(false);
  const [dragId,setDragId]=useState(null);
  const [dragOver,setDragOver]=useState(null);
  const saveRef=useRef(null);
  const lastTsRef=useRef(null);

  useEffect(()=>{
    async function load(){
      try{
        const d=await dbGet();
        if(d?.clients&&Array.isArray(d.clients)&&d.clients.length>0){
          // Migrate: add tasks:{} to any client missing it
          const migrated=d.clients.map(c=>({...c,tasks:c.tasks||{}}));
          setClients(migrated);
          if(d.groups)setGroups(d.groups);
          setNextId(Math.max(...migrated.map(c=>c.id),99)+1);
          lastTsRef.current=d._ts||null;
        }else{
          setClients(DEF_CLIENTS);
          const ts=await dbSet({clients:DEF_CLIENTS,groups:DEF_GROUPS});
          lastTsRef.current=ts;
        }
        setSync("synced");
      }catch(e){console.error(e);setClients(DEF_CLIENTS);setSync("error");}
    }
    load();
  },[]);

  useEffect(()=>{
    if(!clients||sync==="loading") return;
    if(saveRef.current)clearTimeout(saveRef.current);
    setSync("saving");
    saveRef.current=setTimeout(async()=>{
      try{const ts=await dbSet({clients,groups});lastTsRef.current=ts;setLastSave(new Date());setSync("synced");}
      catch(e){console.error(e);setSync("error");}
      finally{saveRef.current=null;}
    },1000);
  },[clients,groups]);

  useEffect(()=>{
    const poll=setInterval(async()=>{
      if(saveRef.current) return;
      try{
        const d=await dbGet();
        if(!d?.clients) return;
        const remoteTs=d._ts?new Date(d._ts).getTime():0;
        const localTs=lastTsRef.current?new Date(lastTsRef.current).getTime():0;
        if(remoteTs>localTs+1000){
          lastTsRef.current=d._ts;
          setClients(p=>JSON.stringify(p)===JSON.stringify(d.clients)?p:d.clients.map(c=>({...c,tasks:c.tasks||{}})));
          if(d.groups)setGroups(g=>JSON.stringify(g)===JSON.stringify(d.groups)?g:d.groups);
        }
      }catch(e){console.warn(e);}
    },8000);
    return()=>clearInterval(poll);
  },[]);

  const upd=useCallback((id,data)=>setClients(p=>p.map(c=>c.id===id?{...c,...data}:c)),[]);
  const del=useCallback((id)=>setClients(p=>p.filter(c=>c.id!==id)),[]);

  function addClient(){
    const nc={id:nextId,name:"New Client",type:"cycle",phase:"C1",startDate:todayStr(),dur:30,pieces:0,group:groups[1]||groups[0],checks:{},ov:{},pd:{},notes:"",tasks:{}};
    setClients(p=>[...p,nc]);setNextId(n=>n+1);
  }
  function updateKey(){const k=prompt("Paste Anthropic API key (sk-ant-...):","");if(k&&k.trim().startsWith("sk-ant-")){localStorage.setItem("fzk_ak",k.trim());alert("Key saved!");}else if(k){alert("Invalid key format");}}

  if(!clients) return (
    <div style={{minHeight:"100vh",background:R,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14}}>
      <div style={{fontSize:28,fontWeight:900,color:W,letterSpacing:-0.5}}>FZK Media</div>
      <div style={{width:24,height:24,border:`3px solid ${W}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
    </div>
  );

  const today=new Date();
  const syncTxt={saving:"Saving",synced:"Synced"+(lastSave?" "+lastSave.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}):""),error:"Sync error",loading:""}[sync]||"";
  const syncClr={saving:"rgba(255,255,255,0.5)",synced:"rgba(255,255,255,0.8)",error:"#FFD580",loading:"transparent"}[sync];
  const totalOv=clients.reduce((a,c)=>a+buildStages(c).filter(s=>s.status==="overdue").length,0);
  const totalDel=clients.filter(c=>elapsed(c.startDate)>(c.dur||30)).length;
  const alerts=totalOv+totalDel;

  const filtered=clients.filter(c=>{
    if(search&&!c.name.toLowerCase().includes(search.toLowerCase())) return false;
    if(filter!=="all"&&c.group!==filter) return false;
    return true;
  });
  const grouped=groups.map(g=>({g,items:filtered.filter(c=>c.group===g)})).filter(x=>x.items.length>0);
  const extra=filtered.filter(c=>!groups.includes(c.group));

  return (

      {/* Nav */}

        <div style={{display:"flex",alignItems:"center",gap:10,minWidth:0}}>
          <div style={{fontSize:17,fontWeight:900,color:W,letterSpacing:-0.5,whiteSpace:"nowrap"}}>FZK Media</div>

              {syncTxt&&<span style={{color:syncClr}}> · {syncTxt}</span>}

            {CY_STAGES.map(s=>(
              <div key={s.key} style={{display:"flex",alignItems:"center",gap:3}}>
                <span style={{width:6,height:6,borderRadius:2,background:s.color,display:"inline-block"}}/>
                <span style={{fontSize:10,color:G5}}>{s.label}</span>
              </div>
            ))}
            <div style={{marginLeft:"auto",display:"flex",gap:9}}>
              {[{l:"Done",c:GR},{l:"Active",c:GR},{l:"Upcoming",c:G4},{l:"Overdue",c:R}].map(s=>(
                <span key={s.l} style={{fontSize:10,color:s.c,display:"flex",alignItems:"center",gap:2}}>
                  <span style={{width:5,height:5,borderRadius:"50%",background:s.c,display:"inline-block"}}/>{s.l}
                </span>
              ))}
            </div>
          </div>
        )}

        {/* Calendar */}
        {view==="calendar"&&<CalView clients={clients}/>}

        {/* Tracker */}
        {view==="tracker"&&(
          filtered.length===0
            ?<div style={{textAlign:"center",padding:"50px 20px",color:G3,border:`1px dashed ${G2}`,borderRadius:14,background:W}}>
                <div style={{fontSize:28,marginBottom:8}}>◎</div>
                <div style={{fontSize:13,color:G5}}>{search?"No clients match":"No clients yet"}</div>
              </div>
            :<div style={{display:"flex",flexDirection:"column",gap:20}}>
              {grouped.map(({g,items})=>{
                const isDrop=dragOver===g;
                return (
                  <div key={g} onDragOver={e=>{e.preventDefault();setDragOver(g);}} onDrop={e=>{e.preventDefault();if(dragId!==null)upd(dragId,{group:g});setDragId(null);setDragOver(null);}}>
                    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:8,padding:isDrop?"6px 10px":"0",background:isDrop?RL:"transparent",borderRadius:8,border:isDrop?`1px dashed ${R}`:"1px solid transparent",transition:"all 0.15s"}}>
                      <span style={{fontSize:13}}>{({"Onboarding":"🌱","Active":"⚡","Getting Started":"🚀","OG Client":"⭐","To Start":"📋"})[g]||"●"}</span>
                      <span style={{fontSize:11,letterSpacing:1.2,textTransform:"uppercase",color:G5,fontWeight:700}}>{g}</span>
                      <span style={{fontSize:10,color:G4,background:G1,padding:"1px 7px",borderRadius:99}}>{items.length}</span>
                      <div style={{flex:1,height:1,background:G1}}/>
                      {isDrop&&<span style={{fontSize:11,color:R,fontWeight:600}}>Drop here</span>}
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:6}}>
                      {items.map(c=>(
                        <Card key={c.id} client={c} onUpdate={d=>upd(c.id,d)} onDelete={()=>del(c.id)} groups={groups} isDrag={dragId===c.id}
                          onDragStart={(e,id)=>{setDragId(id);e.dataTransfer.effectAllowed="move";}}
                          onDragEnd={()=>{setDragId(null);setDragOver(null);}}/>
                      ))}
                    </div>
                  </div>
                );
              })}
              {extra.length>0&&(
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:8}}>
                    <span style={{fontSize:11,letterSpacing:1.2,textTransform:"uppercase",color:G4,fontWeight:700}}>Other</span>
                    <div style={{flex:1,height:1,background:G1}}/>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {extra.map(c=><Card key={c.id} client={c} onUpdate={d=>upd(c.id,d)} onDelete={()=>del(c.id)} groups={groups} isDrag={dragId===c.id} onDragStart={(e,id)=>{setDragId(id);e.dataTransfer.effectAllowed="move";}} onDragEnd={()=>{setDragId(null);setDragOver(null);}}/>)}
                  </div>
                </div>
              )}
            </div>
        )}

        <div style={{marginTop:32,textAlign:"center",fontSize:10,color:G2}}>FZK Media · v6 · {today.toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})}</div>
      </div>

      {showAI&&<AIChat clients={clients} groups={groups} onClose={()=>setShowAI(false)}/>}
      {showGrp&&<GrpMgr groups={groups} onUpdate={setGroups} onClose={()=>setShowGrp(false)}/>}
      {showRpt&&<Report clients={clients} onClose={()=>setShowRpt(false)}/>}
    </div>
  );
}

// ── ROOT ───────────────────────────────────────────────────────────
const AUTH_V="fzk_v6";
function Root(){
  const authed=localStorage.getItem("fzk_auth")==="1"&&localStorage.getItem("fzk_av")===AUTH_V;
  const [ok,setOk]=useState(authed);
  function unlock(){localStorage.setItem("fzk_auth","1");localStorage.setItem("fzk_av",AUTH_V);setOk(true);}
  if(!ok) return <PwScreen onUnlock={unlock}/>;
  return <App/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
