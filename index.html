// ─── HELPERS ──────────────────────────────────────────────────────────────────
const todayStr = () => new Date().toISOString().split("T")[0];
const addDays = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const fmtDate = d => new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short"});
const fmtDateFull = d => new Date(d).toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short"});
const toInput = d => new Date(d).toISOString().split("T")[0];
const daysBetween = (a,b) => Math.floor((new Date(b)-new Date(a))/86400000);
const elapsed = s => daysBetween(s, new Date());

function getStatus(start, dur, done) {
  if(done) return "done";
  const t=new Date(); t.setHours(0,0,0,0);
  const s=new Date(start); s.setHours(0,0,0,0);
  const e=addDays(s,dur); e.setHours(0,0,0,0);
  if(t<s) return "upcoming";
  if(t>=s&&t<e) return "active";
  return "overdue";
}

function getStages(client) {
  const tpl = client.type==="onboarding" ? OB_STAGES : CY_STAGES;
  const base = new Date(client.startDate);
  return tpl.map(s => {
    const autoStart = addDays(base, s.dayOffset);
    const autoEnd   = addDays(autoStart, s.duration);
    const start = client.dateOverrides?.[s.key+"_start"] ? new Date(client.dateOverrides[s.key+"_start"]) : autoStart;
    const end   = client.dateOverrides?.[s.key+"_end"]   ? new Date(client.dateOverrides[s.key+"_end"])   : autoEnd;
    const done  = !!(client.checks?.[s.key]);
    return {...s, start, end, autoStart, autoEnd, done,
      status: getStatus(start, daysBetween(start,end), done),
      startOverridden:!!client.dateOverrides?.[s.key+"_start"],
      endOverridden:  !!client.dateOverrides?.[s.key+"_end"],
    };
  });
}

// ─── DATE OVERRIDE FIELD ──────────────────────────────────────────────────────
function DateField({autoDate, overrideKey, overrides, onOverride}) {
  const [editing, setEditing] = useState(false);
  const isOverridden = !!overrides?.[overrideKey];
  const val = isOverridden ? overrides[overrideKey] : toInput(autoDate);
  if(editing) return (
    <input type="date" defaultValue={val} autoFocus
      onBlur={e=>{if(e.target.value)onOverride(overrideKey,e.target.value);setEditing(false);}}
      style={{...iBase,fontSize:11,padding:"3px 7px",width:130}}/>
  );
  return (
    <span onClick={()=>setEditing(true)} style={{fontSize:11,fontFamily:"monospace",cursor:"pointer",color:isOverridden?C.red:C.gray500,borderBottom:`1px dashed ${isOverridden?C.red:"transparent"}`,display:"flex",alignItems:"center",gap:3}}>
      {fmtDate(val)}
      {isOverridden
        ? <span onClick={e=>{e.stopPropagation();onOverride(overrideKey,null);}} title="Reset to auto" style={{color:C.gray300,fontSize:10}}>↺</span>
        : <span style={{color:C.gray300,fontSize:10}}>✎</span>}
    </span>
  );
}

// ─── POSTING PLAN ─────────────────────────────────────────────────────────────
function PostingPlan({client,onUpdate}) {
  const {pieces,startDate,duration,postDates} = client;
  if(!pieces||pieces<1) return <div style={{fontSize:11,color:C.gray300,fontStyle:"italic",paddingLeft:30,marginTop:6}}>Add piece count to generate posting plan</div>;
  const today=new Date();today.setHours(0,0,0,0);
  const dur = duration||30;
  const slots = Array.from({length:pieces},(_,i)=>{
    const auto = addDays(new Date(startDate),Math.round((i/pieces)*dur));
    const ov = postDates?.[`p${i+1}`];
    return {i,auto,date:ov?new Date(ov):auto,ov:!!ov};
  });
  function setP(k,v) {
    const pd = {...(client.postDates||{})};
    if(!v) delete pd[k]; else pd[k]=v;
    onUpdate({...client,postDates:pd});
  }
  return (
    <div style={{paddingLeft:30,marginTop:8}}>
      <div style={{fontSize:10,color:C.gray500,fontWeight:700,marginBottom:6,letterSpacing:0.5}}>POSTING SCHEDULE — click any date to edit</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {slots.map(s=>{
          const past=s.date<today;
          return (
            <div key={s.i} style={{background:past?C.blueBg:C.gray100,border:`1.5px solid ${s.ov?C.red:past?"#93C5FD":C.gray300}`,borderRadius:8,padding:"4px 10px",display:"flex",alignItems:"center",gap:5}}>
              <span style={{fontSize:10,fontWeight:700,color:past?C.blue:C.gray700}}>P{s.i+1}</span>
              <DateField autoDate={s.auto} overrideKey={`p${s.i+1}`} overrides={client.postDates||{}} onOverride={(k,v)=>setP(k,v)}/>
            </div>
          );
        })}
      </div>
    </div>
  );
}

  const [open,setOpen]=useState(false);
  const stages = useMemo(()=>getStages(client),[client.startDate,client.type,JSON.stringify(client.checks),JSON.stringify(client.dateOverrides)]);

  const dur = client.duration||30;
  const el = elapsed(client.startDate);
  const isDelayed = el>dur;
  const daysLeft = dur-el;
  const isOB = client.type==="onboarding";
  const phColor = isOB?C.purple:C.red;
  const phBg    = isOB?C.purpleBg:C.redLight;

  // ✅ BUG FIX: progress = stages completed / total stages
  const totalStages = stages.length;
  const doneCount   = stages.filter(s=>s.done).length;
  const progress    = totalStages>0 ? Math.round((doneCount/totalStages)*100) : 0;

  const overdue = stages.filter(s=>s.status==="overdue").length;
  const active  = stages.filter(s=>s.status==="active").length;

  function toggleCheck(key,val) {
    const newChecks = {...(client.checks||{}),[key]:val};
    onUpdate({...client,checks:newChecks});
  }
  function override(key,val) {
    const o={...(client.dateOverrides||{})};
    if(val===null)delete o[key]; else o[key]=val;
    onUpdate({...client,dateOverrides:o});
  }

  return (
    <div draggable onDragStart={e=>onDragStart(e,client.id)} onDragEnd={onDragEnd} className="card"
      style={{background:C.white,border:`1.5px solid ${isDelayed?C.redMid:open?"#D1D5DB":C.gray100}`,borderLeft:`4px solid ${phColor}`,borderRadius:14,overflow:"hidden",boxShadow:open?"0 4px 20px rgba(0,0,0,0.08)":"0 1px 4px rgba(0,0,0,0.04)",opacity:isDragging?0.4:1,cursor:"grab",transition:"border-color 0.2s,box-shadow 0.2s"}}>

      {/* Header */}
      <div className="fzk-card-hdr" style={{padding:"14px 18px",display:"flex",alignItems:"center",gap:12,userSelect:"none"}} onClick={()=>setOpen(o=>!o)}>
        <div style={{color:C.gray300,fontSize:14,cursor:"grab",flexShrink:0}}>⠿</div>
        <div className="fzk-avatar" style={{width:38,height:38,borderRadius:10,flexShrink:0,background:phBg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:800,color:phColor}}>
          {client.name.charAt(0).toUpperCase()}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
            <span style={{fontSize:14,fontWeight:700,color:C.black}}>{client.name}</span>
            <span style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:phBg,color:phColor,fontWeight:700}}>{isOB?"Onboarding":client.phase||"Cycle"}</span>
            {isDelayed&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:C.redLight,color:C.redDark,fontWeight:600}}>⚠ {el-dur}d delayed</span>}
            {!isDelayed&&overdue>0&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:C.redLight,color:C.redDark}}>{overdue} overdue</span>}
            {active>0&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:C.greenBg,color:C.green}}>{active} active</span>}
            {doneCount===totalStages&&totalStages>0&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:C.greenBg,color:C.green,fontWeight:700}}>✓ Complete</span>}
          </div>
          <div style={{fontSize:11,color:C.gray500,marginTop:3}}>
            {fmtDate(client.startDate)} → {fmtDate(addDays(new Date(client.startDate),dur))}
            {" · "}
            <span style={{color:isDelayed?C.red:daysLeft<=5&&daysLeft>0?C.orange:C.gray500,fontWeight:isDelayed?700:400}}>
              {isDelayed?`${el} days (${dur} planned)`:daysLeft>0?`${daysLeft}d left`:`Day ${dur}`}
            </span>
            {client.pieces>0&&` · ${client.pieces} pieces`}
          </div>
        </div>
        {/* ✅ BUG FIX: shows stages done / total */}
        <div style={{width:88,flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{fontSize:9,color:C.gray500}}>{doneCount}/{totalStages} stages</span>
            <span style={{fontSize:9,color:progress===100?C.green:C.gray700,fontWeight:600}}>{progress}%</span>
          </div>
          <div style={{height:5,background:C.gray100,borderRadius:99,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${progress}%`,background:progress===100?C.green:`linear-gradient(90deg,${C.red},${C.redDark})`,borderRadius:99,transition:"width 0.4s"}}/>
          </div>
        </div>
        <div style={{color:C.gray300,fontSize:12,transform:open?"rotate(180deg)":"none",transition:"transform 0.15s",flexShrink:0}}>▼</div>
      </div>

      {/* Expanded */}
      {open&&(
        <div style={{borderTop:`1.5px solid ${C.gray100}`,padding:"0 18px 20px",background:C.gray50}}>
          {/* Edit fields */}
          <div style={{display:"flex",gap:10,padding:"14px 0 16px",flexWrap:"wrap",alignItems:"flex-end"}}>
            {/* Type toggle */}
            <div>
              <label style={lbl}>TYPE</label>
              <div style={{display:"flex",borderRadius:8,overflow:"hidden",border:`1.5px solid ${C.gray300}`}}>
                {["cycle","onboarding"].map(t=>(
                  <button key={t} onClick={e=>{e.stopPropagation();onUpdate({...client,type:t,checks:{},dateOverrides:{},postDates:{}});}}
                    style={{padding:"6px 12px",fontSize:12,fontWeight:600,border:"none",background:client.type===t?(t==="onboarding"?C.purple:C.red):C.white,color:client.type===t?C.white:C.gray500}}>
                    {t==="cycle"?"Cycle":"Onboarding"}
                  </button>
                ))}
              </div>
            </div>
            {/* Text/number fields */}
            {[
              {l:"CLIENT NAME",k:"name",   t:"text",  w:170},
              {l:"PHASE",     k:"phase",   t:"text",  w:60},
              {l:"START DATE",k:"startDate",t:"date", w:145},
              {l:"DURATION",  k:"duration",t:"number",w:85,ph:"30"},
              {l:"PIECES",    k:"pieces",  t:"number",w:68,ph:"0"},
            ].map(f=>(
              <div key={f.k}>
                <label style={lbl}>{f.l}{f.k==="duration"?" (days)":""}</label>
                <input type={f.t} value={client[f.k]??""} placeholder={f.ph||""}
                  onChange={e=>onUpdate({...client,[f.k]:f.t==="number"?(parseInt(e.target.value)||0):e.target.value})}
                  onClick={e=>e.stopPropagation()} style={{...iBase,width:f.w}}/>
              </div>
            ))}
            {/* Actual days if delayed */}
            {isDelayed&&(
              <div>
                <label style={lbl}>ACTUAL DAYS</label>
                <input type="number" value={client.actualDays??el} min={dur}
                  onChange={e=>onUpdate({...client,actualDays:parseInt(e.target.value)||null})}
                  style={{...iBase,width:90,borderColor:C.red}}/>
              </div>
            )}
            {/* Group */}
            <div>
              <label style={lbl}>GROUP</label>
              <select value={client.group} onChange={e=>onUpdate({...client,group:e.target.value})}
                onClick={e=>e.stopPropagation()} style={{...iBase,width:155}}>
                {groups.map(g=><option key={g} value={g}>{g}</option>)}
              </select>
            </div>
            <button onClick={e=>{e.stopPropagation();onDelete();}}
              style={{padding:"7px 13px",background:C.redLight,border:`1.5px solid ${C.redMid}`,borderRadius:8,color:C.redDark,fontSize:12,fontWeight:500,marginLeft:"auto"}}>
              Remove
            </button>
          </div>

          {/* Notes */}
          <div style={{marginBottom:14}}>
            <label style={lbl}>NOTES</label>
            <textarea value={client.notes||""} onChange={e=>onUpdate({...client,notes:e.target.value})}
              placeholder="Add notes here…" rows={2}
              style={{...iBase,width:"100%",resize:"vertical",fontSize:12,lineHeight:1.5}}/>
          </div>

          {/* Timeline bar */}
          <div style={{display:"flex",height:6,borderRadius:99,overflow:"hidden",marginBottom:14,background:C.gray100}}>
            {stages.map(s=>(
              <div key={s.key} style={{flex:s.duration,background:s.done?C.green:s.color,opacity:s.status==="upcoming"?0.2:s.status==="done"?0.6:1}}/>
            ))}
          </div>

          {/* Stages */}
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {stages.map(s=>{
              const sc=SC[s.status];
              return (
                <div key={s.key} style={{background:sc.bg,border:`1.5px solid ${sc.border}`,borderRadius:10,padding:"10px 14px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:9,flexWrap:"wrap"}}>
                    <CB checked={s.done} color={s.color} onChange={v=>toggleCheck(s.key,v)}/>
                    <span style={{fontSize:13,fontWeight:600,color:s.done?C.gray300:C.black,flex:1,textDecoration:s.done?"line-through":"none",minWidth:120}}>{s.label}</span>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <span style={{fontSize:10,color:C.gray500}}>From:</span>
                      <DateField autoDate={s.autoStart} overrideKey={s.key+"_start"} overrides={client.dateOverrides||{}} onOverride={override}/>
                    </div>
                    <span style={{fontSize:10,color:C.gray300}}>→</span>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <span style={{fontSize:10,color:C.gray500}}>To:</span>
                      <DateField autoDate={s.autoEnd} overrideKey={s.key+"_end"} overrides={client.dateOverrides||{}} onOverride={override}/>
                    </div>
                    <span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:s.done?C.greenBg:s.status==="active"?C.greenBg:s.status==="overdue"?C.redLight:C.gray100,color:sc.text,fontWeight:500,whiteSpace:"nowrap"}}>{sc.label}</span>
                  </div>
                  {s.key==="posting"&&<PostingPlan client={client} onUpdate={onUpdate}/>}
                </div>
              );
            })}
          </div>

          {/* Delay banner */}
          {isDelayed&&(
            <div style={{marginTop:12,padding:"10px 14px",background:C.redLight,border:`1.5px solid ${C.redMid}`,borderRadius:10,fontSize:12,color:C.redDark,display:"flex",alignItems:"center",gap:8}}>
              <span>⚠</span>
              <span>This {isOB?"onboarding":"cycle"} is <strong>{el-dur} days over</strong> the {dur}-day plan. Actual: {client.actualDays||el} days.</span>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── AI CHAT ──────────────────────────────────────────────────────────────────
function AIChat({clients,groups,onClose}) {
  const [msgs,setMsgs]=useState([{role:"assistant",content:"Hi! I know all your FZK Media clients. Ask me anything — \"Who's overdue?\", \"Anshita's schedule?\", \"Who's delayed?\""}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef(null);
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);

  async function send() {
    if(!input.trim()||loading) return;
    const userMsg={role:"user",content:input.trim()};
    setMsgs(m=>[...m,userMsg]);
    setInput("");
    setLoading(true);
    const today=new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
    const data=clients.map(c=>{
      const stgs=getStages(c);
      const el=elapsed(c.startDate);
      return {name:c.name,type:c.type,phase:c.phase,group:c.group,startDate:c.startDate,duration:c.duration||30,pieces:c.pieces,daysElapsed:el,isDelayed:el>(c.duration||30),notes:c.notes||"",stages:stgs.map(s=>({name:s.label,status:s.status,start:toInput(s.start),end:toInput(s.end),done:s.done})),postDates:c.postDates||{}};
    });
    const sys=`You are the internal ops AI for FZK Media, a personal branding agency in India. Today is ${today}.\n\nFZK Media manages Instagram/LinkedIn for founders. Main content: storytelling reels + carousels.\n\nWork: Onboarding (30d) → Cycle 1 (starts Day 31) → C2 → C3 (~4 months total). Ideation for next cycle starts in last 10 days of current one.\n\nGroups: ${groups.join(", ")}\n\nClient data:\n${JSON.stringify(data,null,2)}\n\nBe specific and concise. Use bullet points. Format dates as DD Mon. If asked who is overdue, list every stage with days overdue.`;

    try {
      // ✅ BUG FIX: messages must start with user role
      const apiMsgs = msgs.filter(m=>m.role==="user"||m.role==="assistant");
      // remove leading assistant messages
      let start=0;
      while(start<apiMsgs.length&&apiMsgs[start].role==="assistant") start++;
      const cleanMsgs=[...apiMsgs.slice(start),userMsg];

      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":ANTHROPIC_KEY(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,system:sys,messages:cleanMsgs}),
      });
      const d=await res.json();
      if(d.error) throw new Error(d.error.message);
      setMsgs(m=>[...m,{role:"assistant",content:d.content?.[0]?.text||"No response."}]);
    } catch(e) {
      setMsgs(m=>[...m,{role:"assistant",content:`Error: ${e.message}. Check your API key.`}]);
    } finally {setLoading(false);}
  }

  return (
    <div className="fzk-ai" style={{position:"fixed",right:0,top:0,bottom:0,width:380,background:C.white,boxShadow:"-4px 0 24px rgba(0,0,0,0.12)",zIndex:1000,display:"flex",flexDirection:"column"}}>
      <div style={{padding:"16px 20px",background:C.red,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:15,fontWeight:800,color:C.white}}>✦ FZK AI Assistant</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.7)"}}>Knows all your client data</div>
        </div>
        <button onClick={onClose} style={{background:"rgba(255,255,255,0.2)",border:"none",color:C.white,borderRadius:8,padding:"4px 10px",fontSize:16}}>✕</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"16px 20px",display:"flex",flexDirection:"column",gap:12}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            <div style={{maxWidth:"85%",padding:"10px 14px",borderRadius:m.role==="user"?"14px 14px 4px 14px":"14px 14px 14px 4px",background:m.role==="user"?C.red:C.gray50,border:m.role==="user"?"none":`1.5px solid ${C.gray100}`,color:m.role==="user"?C.white:C.black,fontSize:13,lineHeight:1.6,whiteSpace:"pre-wrap"}}>
              {m.content}
            </div>
          </div>
        ))}
        {loading&&<div style={{display:"flex",gap:4,padding:"10px 14px",background:C.gray50,border:`1.5px solid ${C.gray100}`,borderRadius:"14px 14px 14px 4px",width:"fit-content"}}>
          {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:C.gray300,animation:`bounce 1s ${i*0.15}s infinite`}}/>)}
        </div>}
        <div ref={bottomRef}/>
      </div>
      <div style={{padding:"0 20px 10px",display:"flex",gap:5,flexWrap:"wrap"}}>
        {["Who's overdue?","Who's delayed?","This week's tasks","Anshita's schedule"].map(q=>(
          <button key={q} onClick={()=>setInput(q)} style={{fontSize:10,padding:"3px 9px",borderRadius:20,border:`1.5px solid ${C.gray300}`,background:C.gray50,color:C.gray700}}>{q}</button>
        ))}
      </div>
      <div style={{padding:"12px 16px",borderTop:`1.5px solid ${C.gray100}`,display:"flex",gap:8}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()}
          placeholder="Ask anything about your clients…" style={{...iBase,flex:1}}/>
        <button onClick={send} disabled={loading||!input.trim()}
          style={{padding:"8px 16px",background:C.red,border:"none",borderRadius:9,color:C.white,fontSize:13,fontWeight:700,opacity:loading||!input.trim()?0.5:1}}>Send</button>
      </div>
    </div>
  );
}

// ─── CALENDAR VIEW ────────────────────────────────────────────────────────────
function CalView({clients}) {
  const [wk,setWk]=useState(0);
  const today=new Date();today.setHours(0,0,0,0);
  const wkStart=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);const day=d.getDay();d.setDate(d.getDate()-(day===0?6:day-1)+wk*7);return d;},[wk]);
  const days=Array.from({length:7},(_,i)=>addDays(wkStart,i));

  const byDay=useMemo(()=>{
    const m={};days.forEach(d=>{m[d.toDateString()]=[];});
    clients.forEach(c=>{
      getStages(c).forEach(s=>{
        days.forEach(d=>{
          const dd=new Date(d);dd.setHours(0,0,0,0);
          const sd=new Date(s.start);sd.setHours(0,0,0,0);
          const ed=new Date(s.end);ed.setHours(0,0,0,0);
          if(dd>=sd&&dd<ed) m[d.toDateString()].push({client:c.name,stage:s.label,status:s.status,color:s.color,done:s.done});
        });
      });
      // individual posting dates
      if(c.pieces>0){
        const dur=c.duration||30;
        Array.from({length:c.pieces},(_,i)=>{
          const ov=c.postDates?.[`p${i+1}`];
          const auto=addDays(new Date(c.startDate),Math.round((i/c.pieces)*dur));
          const d=ov?new Date(ov):auto;
          const ds=d.toDateString();
          if(m[ds]!==undefined) m[ds].push({client:c.name,stage:`Post P${i+1}`,status:"upcoming",color:C.blue,done:false});
        });
      }
    });
    return m;
  },[clients,wkStart]);

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <button onClick={()=>setWk(w=>w-1)} style={{padding:"7px 14px",background:C.white,border:`1.5px solid ${C.gray300}`,borderRadius:8,fontSize:12,color:C.gray700}}>← Prev</button>
        <span style={{fontSize:14,fontWeight:700,color:C.black}}>
          {fmtDateFull(wkStart)} — {fmtDateFull(days[6])}
          {wk===0&&<span style={{fontSize:11,marginLeft:8,color:C.red,fontWeight:600}}>This week</span>}
        </span>
        <button onClick={()=>setWk(w=>w+1)} style={{padding:"7px 14px",background:C.white,border:`1.5px solid ${C.gray300}`,borderRadius:8,fontSize:12,color:C.gray700}}>Next →</button>
      </div>
      {wk!==0&&<button onClick={()=>setWk(0)} style={{fontSize:11,padding:"4px 12px",borderRadius:20,border:`1.5px solid ${C.gray300}`,background:C.gray50,color:C.gray700,marginBottom:12}}>↩ Today</button>}
      <div className="fzk-cal-grid" style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:8}}>
        {days.map(d=>{
          const isToday=d.toDateString()===today.toDateString();
          const tasks=byDay[d.toDateString()]||[];
          return (
            <div key={d.toDateString()} style={{background:isToday?C.redLight:C.white,border:`1.5px solid ${isToday?C.redMid:C.gray100}`,borderRadius:12,padding:"10px 8px",minHeight:120}}>
              <div style={{marginBottom:8}}>
                <div style={{fontSize:10,color:isToday?C.red:C.gray500,fontWeight:700,textTransform:"uppercase"}}>{d.toLocaleDateString("en-GB",{weekday:"short"})}</div>
                <div style={{fontSize:18,fontWeight:800,color:isToday?C.red:C.black}}>{d.getDate()}</div>
              </div>
              {tasks.length===0&&<div style={{fontSize:9,color:C.gray300}}>—</div>}
              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                {tasks.slice(0,5).map((t,i)=>(
                  <div key={i} style={{fontSize:9,padding:"3px 5px",borderRadius:5,background:t.done?C.greenBg:t.status==="overdue"?C.redLight:`${t.color}14`,border:`1px solid ${t.done?"#BBF7D0":t.status==="overdue"?C.redMid:`${t.color}44`}`,color:t.done?C.green:t.status==="overdue"?C.redDark:C.gray700,lineHeight:1.3}}>
                    <div style={{fontWeight:700,color:t.color,fontSize:8}}>{t.client.split(" ")[0]}</div>
                    {t.stage}
                  </div>
                ))}
                {tasks.length>5&&<div style={{fontSize:9,color:C.gray500}}>+{tasks.length-5} more</div>}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{marginTop:20,padding:"16px 20px",background:C.white,borderRadius:12,border:`1.5px solid ${C.gray100}`}}>
        <div style={{fontSize:13,fontWeight:700,color:C.black,marginBottom:10}}>📋 Today — {fmtDateFull(today)}</div>
        {(byDay[today.toDateString()]||[]).length===0
          ?<div style={{fontSize:12,color:C.gray300}}>No active stages today</div>
          :<div style={{display:"flex",flexDirection:"column",gap:6}}>
            {(byDay[today.toDateString()]||[]).map((t,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:C.gray50,borderRadius:8,border:`1.5px solid ${C.gray100}`}}>
                <span style={{width:8,height:8,borderRadius:"50%",background:t.color,flexShrink:0,display:"inline-block"}}/>
                <span style={{fontSize:13,fontWeight:600,color:C.black,flex:1}}>{t.client}</span>
                <span style={{fontSize:12,color:C.gray500}}>{t.stage}</span>
                <span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:t.status==="overdue"?C.redLight:t.done?C.greenBg:C.gray100,color:t.status==="overdue"?C.redDark:t.done?C.green:C.gray500,fontWeight:500}}>{t.done?"Done":t.status}</span>
              </div>
            ))}
          </div>}
      </div>
    </div>
  );
}

// ─── DELAY REPORT ─────────────────────────────────────────────────────────────
function DelayReport({clients,onClose}) {
  const today=new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  const delayed=clients.filter(c=>elapsed(c.startDate)>(c.duration||30));
  const overdueStages=clients.flatMap(c=>getStages(c).filter(s=>s.status==="overdue").map(s=>({client:c.name,stage:s.label,daysOver:Math.floor((new Date()-s.end)/86400000)})));
  overdueStages.sort((a,b)=>b.daysOver-a.daysOver);
  const onTrack=Math.max(0,clients.length-delayed.length-clients.filter(c=>getStages(c).some(s=>s.status==="overdue")).length);

  function buildEmail() {
    let b=`FZK Media — Cycle Tracker Report\n${today}\n\n`;
    if(delayed.length>0){b+=`⚠ DELAYED (${delayed.length})\n${"─".repeat(40)}\n`;delayed.forEach(c=>{const e=elapsed(c.startDate);b+=`• ${c.name} — ${e} days (${e-(c.duration||30)}d over)\n`;});b+="\n";}
    if(overdueStages.length>0){b+=`🔴 OVERDUE STAGES (${overdueStages.length})\n${"─".repeat(40)}\n`;overdueStages.forEach(s=>{b+=`• ${s.client} — ${s.stage} (${s.daysOver}d overdue)\n`;});b+="\n";}
    if(!delayed.length&&!overdueStages.length)b+="✅ All clients on track — no delays.\n";
    b+=`\n—\nFZK Media Cycle Tracker`;
    return b;
  }

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:1100,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:C.white,borderRadius:18,padding:28,width:"100%",maxWidth:520,maxHeight:"85vh",overflowY:"auto",boxShadow:"0 16px 48px rgba(0,0,0,0.18)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div><div style={{fontSize:16,fontWeight:800,color:C.black}}>📧 Delay Report</div><div style={{fontSize:11,color:C.gray500,marginTop:2}}>{today}</div></div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,color:C.gray500}}>✕</button>
        </div>
        <div style={{display:"flex",gap:10,marginBottom:20}}>
          {[{l:"Delayed",v:delayed.length,c:delayed.length>0?C.redDark:C.gray500,bg:delayed.length>0?C.redLight:C.gray50},
            {l:"Overdue Stages",v:overdueStages.length,c:overdueStages.length>0?C.orange:C.gray500,bg:overdueStages.length>0?C.orangeBg:C.gray50},
            {l:"On Track",v:onTrack,c:C.green,bg:C.greenBg}].map(s=>(
            <div key={s.l} style={{flex:1,background:s.bg,borderRadius:10,padding:"10px 14px",textAlign:"center"}}>
              <div style={{fontSize:22,fontWeight:800,color:s.c}}>{s.v}</div>
              <div style={{fontSize:10,color:C.gray500,marginTop:2}}>{s.l}</div>
            </div>
          ))}
        </div>
        {delayed.length>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:C.redDark,marginBottom:8}}>⚠ Delayed Cycles</div>
          {delayed.map(c=>{const e=elapsed(c.startDate);return(
            <div key={c.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 13px",background:C.redLight,border:`1.5px solid ${C.redMid}`,borderRadius:9,marginBottom:5}}>
              <span style={{fontSize:13,fontWeight:600,color:C.black}}>{c.name}</span>

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [clients,   setClients]   = useState(null);
  const [groups,    setGroups]    = useState(DEF_GROUPS);
  const [nextId,    setNextId]    = useState(100);
  const [sync,      setSync]      = useState("loading");
  const [lastSaved, setLastSaved] = useState(null);
  const [view,      setView]      = useState("tracker");
  const [filter,    setFilter]    = useState("all");
  const [search,    setSearch]    = useState("");
  const [showAI,    setShowAI]    = useState(false);
  const [showGrp,   setShowGrp]   = useState(false);
  const [showRpt,   setShowRpt]   = useState(false);
  const [dragId,    setDragId]    = useState(null);
  const [dragOver,  setDragOver]  = useState(null);
  const saveRef = useRef(null);
  const lastSavedTsRef = useRef(null);

  // Load
  useEffect(()=>{
    async function load(){
      try{
        const d=await dbGet();
        if(d?.clients&&Array.isArray(d.clients)&&d.clients.length>0){
          setClients(d.clients);
          if(d.groups) setGroups(d.groups);
          setNextId(Math.max(...d.clients.map(c=>c.id),99)+1);
          lastSavedTsRef.current=d.updatedAt||null;
        } else {
          setClients(DEF);
          await dbSet({clients:DEF,groups:DEF_GROUPS,updatedAt:new Date().toISOString()});
        }
        setSync("synced");
      } catch {setClients(DEF);setSync("error");}
    }
    load();
  },[]);

  // Auto-save debounced
  useEffect(()=>{
    if(!clients||sync==="loading") return;
    if(saveRef.current) clearTimeout(saveRef.current);
    setSync("saving");
    saveRef.current=setTimeout(async()=>{
      try{
        const ts=new Date().toISOString();
        await dbSet({clients,groups,updatedAt:ts});
        lastSavedTsRef.current=ts;
        setLastSaved(new Date());
        setSync("synced");
      } catch {setSync("error");}
    },800);
  },[clients,groups]);

  // Poll every 10s — pull remote if newer than what we last saved
  useEffect(()=>{
    const poll=setInterval(async()=>{
      if(saveRef.current) return; // skip if actively saving
      try{
        const d=await dbGet();
        if(!d?.clients||!d.updatedAt) return;
        const remoteTs=new Date(d.updatedAt).getTime();
        const localTs=lastSavedTsRef.current?new Date(lastSavedTsRef.current).getTime():0;
        if(remoteTs>localTs+3000){
          lastSavedTsRef.current=d.updatedAt;
          setClients(prev=>{
            // only update if actually different to avoid re-render loop
            if(JSON.stringify(prev)===JSON.stringify(d.clients)) return prev;
            return d.clients;
          });
          if(d.groups) setGroups(g=>JSON.stringify(g)===JSON.stringify(d.groups)?g:d.groups);
        }
      } catch{}
    },10000);
    return()=>clearInterval(poll);
  },[]);

  const updateClient=useCallback((id,data)=>setClients(prev=>prev.map(c=>c.id===id?{...c,...data}:c)),[]);
  const deleteClient=useCallback((id)=>setClients(prev=>prev.filter(c=>c.id!==id)),[]);

  function addClient(){
    const nc={id:nextId,name:"New Client",type:"cycle",phase:"C1",startDate:todayStr(),duration:30,pieces:0,group:groups[1]||groups[0],checks:{},dateOverrides:{},postDates:{},actualDays:null,notes:""};
    setClients(p=>[...p,nc]);
    setNextId(n=>n+1);
  }

  if(!clients) return (
    <div style={{minHeight:"100vh",background:C.gray50,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <div style={{fontSize:36,fontWeight:900,color:C.red,letterSpacing:-1}}>FZK Media</div>
      <div style={{width:28,height:28,border:`3px solid ${C.red}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <div style={{fontSize:13,color:C.gray500}}>Loading tracker…</div>
    </div>
  );

  const today=new Date();
  const syncLabel={saving:"Saving…",synced:`● Synced${lastSaved?" "+lastSaved.toLocaleDateString("en-GB",{day:"2-digit",month:"short"})+" "+lastSaved.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}):""}`,error:"⚠ Sync error",loading:""}[sync]||"";
  const syncColor={saving:C.orange,synced:C.green,error:C.red,loading:C.gray300}[sync];
  const totalOverdue=clients.reduce((a,c)=>a+getStages(c).filter(s=>s.status==="overdue").length,0);
  const totalDelayed=clients.filter(c=>elapsed(c.startDate)>(c.duration||30)).length;
  const alerts=totalOverdue+totalDelayed;

  const filtered=clients.filter(c=>{
    if(search&&!c.name.toLowerCase().includes(search.toLowerCase())) return false;
    if(filter!=="all"&&c.group!==filter) return false;
    return true;
  });
  const grouped=groups.map(g=>({g,items:filtered.filter(c=>c.group===g)})).filter(x=>x.items.length>0);
  const extra=filtered.filter(c=>!groups.includes(c.group));

  return (
    <div style={{minHeight:"100vh",background:C.gray50}}>
      {/* Nav */}
      <div className="fzk-nav" style={{background:C.red,padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",minHeight:56,position:"sticky",top:0,zIndex:500,boxShadow:"0 2px 12px rgba(232,32,26,0.3)"}}>
        <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
          <div style={{fontSize:22,fontWeight:900,color:C.white,letterSpacing:-0.5}}>FZK Media</div>
          <div style={{width:1,height:20,background:"rgba(255,255,255,0.3)"}}/>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:"rgba(255,255,255,0.85)"}}>Cycle Tracker</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.6)"}}>{today.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short",year:"numeric"})}</div>
          </div>
          <span style={{fontSize:11,color:syncColor,fontWeight:500}}>{syncLabel}</span>
        </div>
        <div className="nav-buttons" style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={()=>setShowGrp(true)} style={{padding:"7px 13px",background:"rgba(255,255,255,0.15)",border:"1.5px solid rgba(255,255,255,0.25)",borderRadius:8,color:C.white,fontSize:12,fontWeight:600}}>⚙ Groups</button>
          <button onClick={()=>setShowRpt(true)} style={{padding:"7px 13px",background:alerts>0?"rgba(255,255,255,0.95)":"rgba(255,255,255,0.15)",border:"1.5px solid rgba(255,255,255,0.25)",borderRadius:8,color:alerts>0?C.red:C.white,fontSize:12,fontWeight:700}}>
            📧 {alerts>0?`${alerts} Alerts`:"Report"}
          </button>
          <button onClick={()=>setShowAI(s=>!s)} style={{padding:"7px 13px",background:showAI?C.white:"rgba(255,255,255,0.15)",border:"1.5px solid rgba(255,255,255,0.25)",borderRadius:8,color:showAI?C.red:C.white,fontSize:12,fontWeight:700}}>✦ AI Chat</button>
          <button onClick={()=>{const k=prompt("Paste Anthropic API key (sk-ant-...):","");if(k&&k.trim().startsWith("sk-ant-")){localStorage.setItem("fzk_anthropic_key",k.trim());alert("✅ Key saved!");}else if(k){alert("Invalid — must start with sk-ant-");}}} style={{padding:"7px 10px",background:"rgba(255,255,255,0.12)",border:"1.5px solid rgba(255,255,255,0.2)",borderRadius:8,color:"rgba(255,255,255,0.8)",fontSize:11}}>🔑</button>
          <button onClick={addClient} style={{padding:"7px 16px",background:C.white,border:"none",borderRadius:8,color:C.red,fontSize:12,fontWeight:800,boxShadow:"0 2px 8px rgba(0,0,0,0.15)"}}>+ Add Client</button>
        </div>
      </div>

      <div className="main-pad" className="fzk-main" style={{maxWidth:view==="calendar"?1000:860,margin:"0 auto",padding:"28px 20px",overflowX:"hidden"}}>
        {/* Stats */}
        <div className="fzk-stats" style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:22}}>
          {[
            {l:"Total Clients",v:clients.length,c:C.red},
            {l:"Active",v:clients.filter(c=>c.group==="Active").length,c:C.green},
            {l:"Onboarding",v:clients.filter(c=>c.type==="onboarding").length,c:C.purple},
            {l:"Overdue Stages",v:totalOverdue,c:totalOverdue>0?C.red:C.gray300},
            {l:"Delayed",v:totalDelayed,c:totalDelayed>0?C.orange:C.gray300},
          ].map(s=>(
            <div key={s.l} style={{background:C.white,border:`1.5px solid ${C.gray100}`,borderRadius:12,padding:"12px 16px",flex:1,minWidth:90,boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
              <div style={{fontSize:22,fontWeight:900,color:s.c}}>{s.v}</div>
              <div style={{fontSize:10,color:C.gray500,marginTop:2,fontWeight:600}}>{s.l}</div>
            </div>
          ))}
        </div>

        {/* View + search + filter */}
        <div className="fzk-viewrow" style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>
          <div style={{display:"flex",borderRadius:9,overflow:"hidden",border:`1.5px solid ${C.gray300}`,flexShrink:0}}>
            {[["tracker","📋 Tracker"],["calendar","📅 Calendar"]].map(([v,l])=>(
              <button key={v} onClick={()=>setView(v)} style={{padding:"8px 14px",fontSize:12,fontWeight:view===v?700:500,border:"none",background:view===v?C.red:C.white,color:view===v?C.white:C.gray700}}>{l}</button>
            ))}
          </div>
          {view==="tracker"&&<>
            <input className="fzk-search" placeholder="🔍  Search clients…" value={search} onChange={e=>setSearch(e.target.value)}
              style={{...iBase,flex:1,minWidth:160,padding:"9px 13px"}}/>
            <div className="fzk-pills" style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {["all",...groups].map(g=>(
                <button key={g} onClick={()=>setFilter(g)} style={{padding:"7px 12px",borderRadius:8,fontSize:11,fontWeight:filter===g?700:500,background:filter===g?C.redLight:C.white,border:`1.5px solid ${filter===g?C.redMid:C.gray300}`,color:filter===g?C.redDark:C.gray700}}>
                  {g==="all"?"All":g}
                </button>
              ))}
            </div>
          </>}
        </div>

        {/* Legend */}
        {view==="tracker"&&(
          <div className="fzk-legend" style={{display:"flex",gap:12,marginBottom:18,flexWrap:"wrap",padding:"9px 14px",background:C.white,borderRadius:10,border:`1.5px solid ${C.gray100}`,alignItems:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
            {CY_STAGES.map(s=>(
              <div key={s.key} style={{display:"flex",alignItems:"center",gap:4}}>
                <span style={{width:7,height:7,borderRadius:2,background:s.color,display:"inline-block"}}/>
                <span style={{fontSize:10,color:C.gray500,fontWeight:500}}>{s.label}</span>
              </div>
            ))}
            <div style={{marginLeft:"auto",display:"flex",gap:10}}>
              {Object.entries(SC).map(([k,v])=>(
                <span key={k} style={{fontSize:10,color:v.text,display:"flex",alignItems:"center",gap:3,fontWeight:500}}>
                  <span style={{width:5,height:5,borderRadius:"50%",background:v.dot,display:"inline-block"}}/>{v.label}
                </span>
              ))}
            </div>
          </div>
        )}

        {/* Views */}
        {view==="calendar"&&<CalView clients={clients}/>}
        {view==="tracker"&&(
          filtered.length===0
            ?<div style={{textAlign:"center",padding:"60px 20px",color:C.gray300,border:`2px dashed ${C.gray100}`,borderRadius:16,background:C.white}}>
              <div style={{fontSize:32,marginBottom:10}}>◎</div>
              <div style={{fontSize:14,color:C.gray500}}>{search?"No clients match":"No clients yet"}</div>
            </div>
            :<div style={{display:"flex",flexDirection:"column",gap:24}}>
              {grouped.map(({g,items})=>{
                const isDrop=dragOver===g;
                return (
                  <div key={g}
                    onDragOver={e=>{e.preventDefault();setDragOver(g);}}
                    onDrop={e=>{e.preventDefault();if(dragId!==null)updateClient(dragId,{group:g});setDragId(null);setDragOver(null);}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,padding:isDrop?"8px 12px":"0",background:isDrop?C.redLight:"transparent",borderRadius:9,border:isDrop?`1.5px dashed ${C.red}`:"1.5px solid transparent",transition:"all 0.15s"}}>
                      <span style={{width:8,height:8,borderRadius:"50%",background:C.red,display:"inline-block"}}/>
                      <span style={{fontSize:11,letterSpacing:1.5,textTransform:"uppercase",color:C.red,fontWeight:800}}>{g}</span>
                      <span style={{fontSize:11,color:C.gray500,background:C.gray100,padding:"1px 8px",borderRadius:99,fontWeight:500}}>{items.length}</span>
                      <div style={{flex:1,height:1.5,background:C.gray100}}/>
                      {isDrop&&<span style={{fontSize:11,color:C.red,fontWeight:600}}>Drop here</span>}
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      {items.map(c=>(
                        <Card key={c.id} client={c} onUpdate={d=>updateClient(c.id,d)} onDelete={()=>deleteClient(c.id)}
                          groups={groups} isDragging={dragId===c.id}
                          onDragStart={(e,id)=>{setDragId(id);e.dataTransfer.effectAllowed="move";}}
                          onDragEnd={()=>{setDragId(null);setDragOver(null);}}/>
                      ))}
                    </div>
                  </div>
                );
              })}
              {extra.length>0&&(
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                    <span style={{fontSize:11,letterSpacing:1.5,textTransform:"uppercase",color:C.gray500,fontWeight:700}}>Other</span>
                    <div style={{flex:1,height:1.5,background:C.gray100}}/>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {extra.map(c=><Card key={c.id} client={c} onUpdate={d=>updateClient(c.id,d)} onDelete={()=>deleteClient(c.id)} groups={groups} isDragging={dragId===c.id} onDragStart={(e,id)=>{setDragId(id);e.dataTransfer.effectAllowed="move";}} onDragEnd={()=>{setDragId(null);setDragOver(null);}}/>)}
                  </div>
                </div>
              )}
            </div>
        )}

        <div style={{marginTop:40,textAlign:"center",fontSize:10,color:C.gray300}}>
          FZK Media · Cycle Tracker v3 · GitHub Pages + Supabase · {today.toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})}
        </div>
      </div>

      {showAI&&<AIChat clients={clients} groups={groups} onClose={()=>setShowAI(false)}/>}
      {showGrp&&<GroupMgr groups={groups} onUpdate={setGroups} onClose={()=>setShowGrp(false)}/>}
      {showRpt&&<DelayReport clients={clients} onClose={()=>setShowRpt(false)}/>}
    </div>
  );
}


// ─── PASSWORD SCREEN ──────────────────────────────────────────────────────────
const TRACKER_PASSWORD = "vibing@fzkMEdia26"; // 🔒 Change this password

function PasswordScreen({onUnlock}) {
  const [step, setStep] = useState("pw");
  const [pw, setPw] = useState("");
  const [apiKey, setApiKey] = useState("");
  const [pwErr, setPwErr] = useState(false);
  const [keyErr, setKeyErr] = useState(false);

  function attemptPw() {
    if(pw.trim() === TRACKER_PASSWORD) {
      localStorage.setItem("fzk_auth","1");
      if(!localStorage.getItem("fzk_anthropic_key")) setStep("key");
      else onUnlock();

      setPwErr(true);
      setTimeout(()=>setPwErr(false),1500);

        <input value={apiKey} onChange={e=>setApiKey(e.target.value)}

          placeholder="sk-ant-api03-..."
          style={{...iBase,width:"100%",padding:"11px 14px",fontSize:13,border:`2px solid ${keyErr?C.red:C.gray300}`,marginBottom:8}}/>
        {keyErr&&<div style={{fontSize:12,color:C.red,marginBottom:8,fontWeight:600}}>Must start with sk-ant-</div>}
        <button onClick={saveKey} style={{width:"100%",padding:"12px",background:C.red,border:"none",borderRadius:10,color:C.white,fontSize:14,fontWeight:800,marginBottom:10,boxShadow:`0 4px 16px ${C.red}44`}}>

      <div style={boxStyle}>
        <div style={{fontSize:28,fontWeight:900,color:C.red,letterSpacing:-1,marginBottom:4}}>FZK Media</div>
        <div style={{fontSize:13,color:C.gray500,marginBottom:28}}>Cycle Tracker · Team Access</div>
        <input type="password" value={pw} onChange={e=>setPw(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&attemptPw()}
          placeholder="Team password"
          style={{...iBase,width:"100%",padding:"12px 16px",fontSize:15,textAlign:"center",border:`2px solid ${pwErr?C.red:C.gray300}`,marginBottom:12}}
          autoFocus/>
        {pwErr&&<div style={{fontSize:12,color:C.red,marginBottom:8,fontWeight:600}}>Wrong password. Try again.</div>}
        <button onClick={attemptPw} style={{width:"100%",padding:"12px",background:C.red,border:"none",borderRadius:10,color:C.white,fontSize:15,fontWeight:800,boxShadow:`0 4px 16px ${C.red}44`}}>
          Access Tracker
        </button>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.5)",marginTop:14}}>FZK Media · Internal Tool</div>
      </div>
    </div>
  );
}

const AUTH_VERSION = "v3"; // bump this to force re-auth on all devices

function Root() {
  const savedVersion = localStorage.getItem("fzk_auth_version");
  const isAuthed = !!localStorage.getItem("fzk_auth") && savedVersion === AUTH_VERSION;
  const [authed, setAuthed] = useState(isAuthed);

  function handleUnlock() {
    localStorage.setItem("fzk_auth_version", AUTH_VERSION);
    setAuthed(true);
  }

  if(!authed) return <PasswordScreen onUnlock={handleUnlock}/>;
  return <App/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
